<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS POS - Login / Registro</title>
    <link rel="icon" type="image/png" href="logo_nexus.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilo para el contenedor de mensajes de notificación */
        .message-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        /* Estilo para el spinner de carga */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); } 
        }
        /* Ocultar el body inicialmente para evitar el parpadeo */
        body {
            display: none; 
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">
    
    <div id="app-loading" class="flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <p class="text-gray-600">Cargando...</p>
    </div>

    <div id="app-content" class="hidden">
        <div id="auth-forms-container" class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full text-center">
            <img src="logo_nexus.png" alt="NEXUS POS Logo" class="w-[200px] h-[200px] mx-auto mb-6 object-contain">

            <div id="login-container" class="transition-transform duration-300 transform translate-x-0">
                <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">Inicia Sesión Como Administrador</h1>
                <form id="login-form">
                    <div class="mb-4">
                        <label for="login-email" class="block text-gray-700 font-bold mb-2">Correo Electrónico</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="material-icons text-gray-400">email</i>
                            </span>
                            <input type="email" id="login-email" name="email" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                    </div>
                    <div class="mb-6">
                        <label for="login-password" class="block text-gray-700 font-bold mb-2">Contraseña</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="material-icons text-gray-400">lock</i>
                            </span>
                            <input type="password" id="login-password" name="password" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                    </div>
                    <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 transition font-bold">Entrar</button>
                </form>
                <div class="mt-4 flex flex-col items-center gap-3">
                    <a href="#" id="show-register" class="w-full bg-green-600 text-white py-3 px-4 rounded-md hover:bg-green-700 transition font-bold border border-green-600 p-1">Crear Cuenta de Administrador</a>
                </div>
            </div>

            <div id="register-container" class="hidden transition-transform duration-300 transform -translate-x-full">
                <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">Crear Cuenta de Administrador</h1>
                <form id="register-form">
                    <div class="mb-4">
                        <label for="register-email" class="block text-gray-700 font-bold mb-2">Correo Electrónico</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="material-icons text-gray-400">email</i>
                            </span>
                            <input type="email" id="register-email" name="email" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                    </div>
                    <div class="mb-6">
                        <label for="register-password" class="block text-gray-700 font-bold mb-2">Contraseña</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <i class="material-icons text-gray-400">lock</i>
                            </span>
                            <input type="password" id="register-password" name="password" class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                    </div>
                    <button type="submit" id="register-btn" class="w-full bg-green-600 text-white py-3 px-4 rounded-md hover:bg-green-700 transition font-bold">Registrarse</button>
                </form>
                <div class="mt-4 text-center">
                    <a href="#" id="show-login" class="text-blue-600 hover:underline">¿Ya tienes una cuenta? Inicia Sesión</a>
                </div>
            </div>
            
        </div>
    </div>
    

    <div id="message-box" class="message-box"></div>
    
    <script type="module">
        // Importar las funciones necesarias de Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        

        // ==================================================================================================
        // === CONFIGURACIÓN DE FIREBASE Y VARIABLES GLOBALES ===
        // ==================================================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDN9mZ1n-OkC-Qz52eTCOy4yJH7M0U9zYI",
            authDomain: "nexus-pos-75593.firebaseapp.com",
            projectId: "nexus-pos-75593",
            storageBucket: "nexus-pos-75593.firebasestorage.app",
            messagingSenderId: "626840984883",
            appId: "1:626840984883:web:08d56544ee28bc8e637246",
            measurementId: "G-K1EQVJWJHG"
        };
        
        // La URL del backend no es relevante para el registro simple, pero se mantiene.
        const VPS_BACKEND_URL = 'https://admin.backend.api.nexusposgobal.com/'; 


        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // ==================================================================================================
        // === FUNCIONES DE AUTENTICACIÓN ===
        // ==================================================================================================

        /**
         * Función para iniciar sesión con correo y contraseña.
         */
        async function signIn(email, password) {
            return await signInWithEmailAndPassword(auth, email, password);
        }

        /**
         * Función para registrar un nuevo usuario administrador.
         */
        async function registerAdminUser(email, password) {
            return await createUserWithEmailAndPassword(auth, email, password);
        }

        // ==================================================================================================
        // === LÓGICA DEL DOM Y EVENT LISTENERS ===
        // ==================================================================================================
        
        // Referencias a los elementos del DOM
        const loadingContainer = document.getElementById('app-loading');
        const appContent = document.getElementById('app-content');
        const loginContainer = document.getElementById('login-container');
        const registerContainer = document.getElementById('register-container');
        
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        
        const showRegisterBtn = document.getElementById('show-register');
        const showLoginBtn = document.getElementById('show-login');
        
        const messageBox = document.getElementById('message-box');

        // Función para mostrar mensajes de notificación
        function showMessage(message, type = 'success') {
            const messageDiv = document.createElement('div');
            messageDiv.textContent = message;
            messageDiv.className = `p-3 mb-2 rounded-lg text-white font-bold shadow-lg transition-transform transform duration-300 ease-in-out ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} translate-y-0 opacity-100`;
            
            messageBox.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.classList.add('translate-y-full', 'opacity-0');
                messageDiv.addEventListener('transitionend', () => messageDiv.remove());
            }, 3000);
        }

        // Función para alternar la visibilidad de los formularios de autenticación
        function toggleForms(targetFormId) {
            // Ocultar todos los formularios primero
            loginContainer.classList.add('hidden', 'translate-x-full');
            registerContainer.classList.add('hidden', 'translate-x-full');
            
            // Mostrar el formulario objetivo
            if (targetFormId === 'login') {
                loginContainer.classList.remove('hidden', 'translate-x-full');
                loginContainer.classList.add('translate-x-0');
            } else if (targetFormId === 'register') {
                registerContainer.classList.remove('hidden', 'translate-x-full');
                registerContainer.classList.add('translate-x-0');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {

            // === LÓGICA DE CONTROL DE ESTADO DE SESIÓN Y REDIRECCIÓN (FIX para bucle post-logout) ===
            const urlParams = new URLSearchParams(window.location.search);
            const isLogoutDetected = urlParams.get('logout') === 'true'; 

            if (isLogoutDetected) {
                console.log("Detectado cierre de sesión, limpiando parámetro.");
                // Limpiamos el historial para eliminar el parámetro 'logout'
                window.history.replaceState(null, null, 'login.html'); 
            }
            // =======================================================================================
            
            onAuthStateChanged(auth, async (user) => {
                // Oculta el spinner de carga
                loadingContainer.classList.add('hidden');
                // IMPORTANTE: Mostrar el cuerpo después de la verificación para evitar el "parpadeo"
                document.body.style.display = 'flex'; 

                if (user) {
                    // **FIX para el bucle post-logout:** Si se detecta un usuario DESPUÉS de un logout
                    if (isLogoutDetected) {
                         console.warn("ADVERTENCIA: Usuario detectado temporalmente después de logout. Mostrando login.");
                         appContent.classList.remove('hidden'); 
                         toggleForms('login'); 
                         return; // EVITA la redirección a clientes.html
                    }
                    
                    // Si el usuario está autenticado y NO venimos de un logout, redirigir
                    console.log("Usuario autenticado. Redirigiendo a clientes.html");
                    window.location.replace('clientes.html'); 
                } else {
                    // Si no hay usuario, mostrar el contenido principal (formularios de autenticación)
                    console.log("No hay usuario. Mostrando formulario de login.");
                    appContent.classList.remove('hidden'); 
                    toggleForms('login'); 
                }
            });

            // Listener para el formulario de inicio de sesión
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = loginForm['login-email'].value;
                    const password = loginForm['login-password'].value;
                    
                    try {
                        await signIn(email, password);
                        showMessage("Inicio de sesión exitoso.", "success");
                        // 🟢 FIX DE REDIRECCIÓN: Forzar la redirección aquí para evitar retrasos
                        window.location.replace('clientes.html'); 
                    } catch (error) {
                        console.error("Error al iniciar sesión:", error);
                        let errorMessage = "Ocurrió un error al iniciar sesión.";
                        switch (error.code) {
                            case 'auth/invalid-email':
                                errorMessage = 'El correo electrónico es inválido.';
                                break;
                            case 'auth/user-not-found':
                            case 'auth/wrong-password':
                            case 'auth/invalid-credential':
                                errorMessage = 'Credenciales inválidas.';
                                break;
                            default:
                                errorMessage = 'Ocurrió un error inesperado.';
                                break;
                        }
                        showMessage(errorMessage, "error");
                    }
                });
            }

            // Listener para el formulario de registro de usuario administrador
            if (registerForm) {
                registerForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = registerForm['register-email'].value;
                    const password = registerForm['register-password'].value;
                    
                    try {
                        await registerAdminUser(email, password);
                        showMessage("¡Cuenta de Administrador creada! Inicia sesión para continuar.", "success");
                        toggleForms('login'); // Redirigir al login después del registro
                    } catch (error) {
                        console.error("Error al registrar usuario administrador:", error);
                        let errorMessage = "Ocurrió un error al registrarse.";
                        switch (error.code) {
                            case 'auth/email-already-in-use':
                                errorMessage = 'El correo electrónico ya está en uso.';
                                break;
                            case 'auth/invalid-email':
                                errorMessage = 'El correo electrónico es inválido.';
                                break;
                            case 'auth/weak-password':
                                errorMessage = 'La contraseña es demasiado débil. Debe tener al menos 6 caracteres.';
                                break;
                            default:
                                errorMessage = 'Ocurrió un error inesperado.';
                                break;
                        }
                        showMessage(errorMessage, "error");
                    }
                });
            }

            // Listeners para los botones de alternar formularios
            if (showRegisterBtn) {
                showRegisterBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleForms('register');
                });
            }
            if (showLoginBtn) {
                showLoginBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleForms('login');
                });
            }
        });
    </script>
</body>
</html>
