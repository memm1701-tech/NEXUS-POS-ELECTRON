<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS POS - Historial de Ventas</title>
    <link rel="icon" type="image/png" href="logo_nexus.png">

    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.co"></script>
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Fuente Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6; /* gray-100 */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alineado arriba */
            min-height: 100vh;
            padding: 2rem;
        }

        /* Estilos para el spinner de carga */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6; /* blue-500 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Estilos para el modal */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-close-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4a5568;
            transition: color 0.2s ease;
        }

        .modal-close-button:hover {
            color: #1a202c;
        }
    </style>
</head>
<body class="bg-gray-100">
    <main class="main-content px-8 py-4 flex justify-center w-full"> 
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-5xl">
            <h2 class="text-3xl font-bold mb-8 text-gray-800 text-center flex items-center justify-center">
                <span class="material-icons text-green-600 mr-3 text-4xl">receipt_long</span>
                Historial de Ventas
            </h2>

            <!-- Sección de Historial de Ventas -->
            <div class="mb-8 p-6 border border-gray-200 rounded-lg shadow-sm">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tl-lg">
                                    Fecha/Hora
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    ID Venta
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Total (Bs)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Artículos
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Método de Pago
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tr-lg">
                                    Usuario
                                </th>
                            </tr>
                        </thead>
                        <tbody id="sales-history-list" class="bg-white divide-y divide-gray-200">
                            <!-- El historial de ventas se cargará aquí dinámicamente -->
                            <tr>
                                <td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                                    Cargando historial de ventas...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Custom Message Modal -->
    <div id="info-message-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-info-message-modal" class="modal-close-button">
                <span class="material-icons">close</span>
            </button>
            <h3 id="info-message-title" class="text-xl font-bold mb-4 text-gray-800 text-center"></h3>
            <p id="info-message-text" class="text-gray-700 mb-6 text-center whitespace-pre-line"></p>
            <div class="flex justify-center">
                <button id="info-message-ok-btn" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Firebase variables (provided by Canvas environment)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app, db, auth, userId;
        let isAuthReady = false;

        // Custom Message Modal elements
        const infoMessageModalOverlay = document.getElementById('info-message-modal-overlay');
        const infoMessageTitle = document.getElementById('info-message-title');
        const infoMessageText = document.getElementById('info-message-text');
        const closeInfoMessageModal = document.getElementById('close-info-message-modal');
        const infoMessageOkBtn = document.getElementById('info-message-ok-btn');

        // Function to show custom message modal
        function showInfoMessage(message, type = 'info') {
            let title = '';
            infoMessageTitle.classList.remove('text-orange-600', 'text-red-600', 'text-blue-600', 'text-green-600');
            if (type === 'warning') {
                title = 'Advertencia';
                infoMessageTitle.classList.add('text-orange-600');
            } else if (type === 'error') {
                title = 'Error';
                infoMessageTitle.classList.add('text-red-600');
            } else if (type === 'success') {
                title = 'Éxito';
                infoMessageTitle.classList.add('text-green-600');
            } else {
                title = 'Información';
                infoMessageTitle.classList.add('text-blue-600');
            }
            infoMessageTitle.textContent = title;
            infoMessageText.innerHTML = message;
            infoMessageModalOverlay.classList.add('open');
        }

        // Function to hide custom message modal
        function hideInfoMessage() {
            infoMessageModalOverlay.classList.remove('open');
        }

        // Event listeners for custom message modal
        closeInfoMessageModal.addEventListener('click', hideInfoMessage);
        infoMessageOkBtn.addEventListener('click', hideInfoMessage);
        infoMessageModalOverlay.addEventListener('click', (e) => {
            if (e.target === infoMessageModalOverlay) {
                hideInfoMessage();
            }
        });

        // Initialize Firebase and set up authentication
        async function initializeFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // Authenticate anonymously or with custom token
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        isAuthReady = true;
                        console.log("Firebase Auth Ready. User ID:", userId);
                        // Start listening for data once authenticated
                        listenForSalesHistory();
                    } else {
                        userId = null;
                        isAuthReady = false;
                        console.log("No user signed in.");
                    }
                });

            } catch (error) {
                console.error("Error initializing Firebase or signing in:", error);
                showInfoMessage(`Hubo un error al iniciar la aplicación. Por favor, intente de nuevo. Error: ${error.message}`, 'error');
            }
        }

        // DOM element for sales history list
        const salesHistoryList = document.getElementById('sales-history-list');

        // Function to listen for real-time updates to sales history
        function listenForSalesHistory() {
            if (!isAuthReady || !userId) {
                console.log("Not ready to listen for sales history. Auth status:", isAuthReady, "userId:", userId);
                return;
            }

            const salesCollectionRef = collection(db, `artifacts/${appId}/users/${userId}/sales_history`);
            // Note: orderBy is commented out as per instructions, but would typically be used for sorting by timestamp
            const q = query(salesCollectionRef/*, orderBy('timestamp', 'desc')*/); 

            onSnapshot(q, (snapshot) => {
                salesHistoryList.innerHTML = ''; // Clear current list

                if (snapshot.empty) {
                    salesHistoryList.innerHTML = `
                        <tr>
                            <td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                                No hay ventas registradas.
                            </td>
                        </tr>
                    `;
                } else {
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const date = data.timestamp ? new Date(data.timestamp.toDate()) : new Date();
                        const formattedDate = date.toLocaleDateString('es-ES', { 
                            year: 'numeric', month: 'short', day: 'numeric', 
                            hour: '2-digit', minute: '2-digit' 
                        });

                        const row = `
                            <tr class="hover:bg-gray-100">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${formattedDate}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${doc.id}</td> <!-- Using doc.id as Sale ID -->
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">Bs ${data.totalAmount ? data.totalAmount.toFixed(2) : '0.00'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${data.itemCount || 0}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${data.paymentMethod || 'N/A'}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${data.recordedBy || 'Desconocido'}</td>
                            </tr>
                        `;
                        salesHistoryList.innerHTML += row;
                    });
                }
            }, (error) => {
                console.error("Error listening for sales history:", error);
                showInfoMessage(`Hubo un error al cargar el historial de ventas. Error: ${error.message}`, 'error');
            });
        }

        // Initialize Firebase on DOM content loaded
        initializeFirebase();
    </script>
</body>
</html>
