<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS POS - Gestión de Gastos</title>
    <link rel="icon" type="image/png" href="https://placehold.co/16x16/000000/FFFFFF?text=NX">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-close-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4a5568;
            transition: color 0.2s ease;
        }

        .modal-close-button:hover {
            color: #1a202c;
        }
        
        .user-info-display {
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.75;
            color: #1f2937;
        }
        .user-info-display .label {
            font-weight: normal;
        }
        .user-info-display .value {
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-white">
    <main class="main-content flex justify-center w-full min-h-screen"> 
        <div class="bg-white p-6 w-full h-full">
            <h2 class="text-3xl font-bold text-gray-800 text-center flex items-center justify-center mb-6">
                <span class="material-icons text-red-600 mr-3 text-4xl">receipt_long</span>
                Gestión de Gastos
            </h2>

            <div class="mb-8 p-6 border border-gray-200 rounded-lg shadow-sm">
                <h3 class="text-xl font-semibold mb-4 text-gray-700">Registrar Nuevo Gasto</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label for="expense-description" class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                        <input type="text" id="expense-description"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. Pago a proveedor">
                    </div>
                    <div>
                        <label for="expense-amount-bs" class="block text-sm font-medium text-gray-700 mb-2">Monto (Bs)</label>
                        <input type="number" id="expense-amount-bs" step="0.01" min="0"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. 75.00">
                    </div>
                    <div id="expense-method-bs-group" class="hidden">
                        <label for="expense-method-bs" class="block text-sm font-medium text-gray-700 mb-2">Método Egreso (Bs)</label>
                        <select id="expense-method-bs"
                                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5">
                            <option value="">-- Seleccionar --</option>
                            <option value="Efectivo">Efectivo</option>
                            <option value="Tarjeta de Débito">Tarjeta de Débito</option>
                            <option value="Pago Móvil">Pago Móvil</option>
                            <option value="Transferencia">Transferencia</option>
                            <option value="Depósito">Depósito</option>
                            <option value="Crédito">Crédito</option>
                            <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                            <option value="Zelle">Zelle</option>
                            <option value="PayPal">PayPal</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label for="expense-amount-usd" class="block text-sm font-medium text-gray-700 mb-2">Monto (Divisa)</label>
                        <input type="number" id="expense-amount-usd" step="0.01" min="0"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. 2.50">
                    </div>
                </div>
                <button id="add-expense-btn"
                        class="mt-6 w-full bg-red-600 text-white py-3 px-6 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition duration-150 ease-in-out text-lg font-semibold shadow-md flex items-center justify-center">
                    <span class="material-icons mr-2">remove_circle_outline</span>
                    Agregar Gasto
                </button>
            </div>

            <div class="mb-8 p-6 border border-gray-200 rounded-lg shadow-sm">
                <h3 class="text-xl font-semibold mb-4 text-gray-700 flex items-center justify-between">
                    Gastos Registrados
                    <span id="total-expense-display" class="text-red-700 text-2xl font-bold">Bs 0.00</span>
                </h3>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tl-lg">
                                    Descripción
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Monto (Bs)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Método (Bs)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Monto (Divisa)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Fecha
                                </th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tr-lg">
                                    Acciones
                                </th>
                            </tr>
                        </thead>
                        <tbody id="expense-list" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                                    No hay gastos registrados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="info-message-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-info-message-modal" class="modal-close-button">
                <span class="material-icons">close</span>
            </button>
            <h3 id="info-message-title" class="text-xl font-bold mb-4 text-gray-800 text-center"></h3>
            <p id="info-message-text" class="text-gray-700 mb-6 text-center whitespace-pre-line"></p>
            <div class="flex justify-center">
                <button id="info-message-ok-btn" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">Aceptar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let app;
        if (getApps().length === 0) {
            app = initializeApp(firebaseConfig);
        } else {
            app = getApp();
        }

        const auth = getAuth(app);
        const db = getFirestore(app);

        let userId = null; 
        let companyId = null; 
        let branchId = null; 
        let role = null;
        let isAuthReady = false;

        const userIdDisplay = document.getElementById('userIdDisplay');
        const companyIdDisplay = document.getElementById('companyIdDisplay');
        const roleDisplay = document.getElementById('roleDisplay');
        const expenseList = document.getElementById('expense-list');
        const totalExpenseDisplay = document.getElementById('total-expense-display');

        const expenseDescriptionInput = document.getElementById('expense-description');
        const expenseAmountBsInput = document.getElementById('expense-amount-bs');
        const expenseMethodBsGroup = document.getElementById('expense-method-bs-group'); 
        const expenseMethodBs = document.getElementById('expense-method-bs'); 
        const expenseAmountUsdInput = document.getElementById('expense-amount-usd');
        const addExpenseBtn = document.getElementById('add-expense-btn');

        const modalOverlay = document.getElementById('info-message-modal-overlay');
        const modalTitle = document.getElementById('info-message-title');
        const modalText = document.getElementById('info-message-text');
        const modalCloseBtn = document.getElementById('close-info-message-modal');
        const modalOkBtn = document.getElementById('info-message-ok-btn');

        function showModal(title, message, isError = false) {
            if (!modalOverlay) return;
            modalTitle.textContent = title;
            modalText.textContent = message;
            modalTitle.classList.toggle('text-red-600', isError);
            modalTitle.classList.toggle('text-blue-600', !isError);
            modalOverlay.classList.add('open');
        }

        function hideModal() {
            if (modalOverlay) {
                modalOverlay.classList.remove('open');
            }
        }

        if (modalCloseBtn) {
            modalCloseBtn.onclick = hideModal;
        }
        if (modalOkBtn) {
            modalOkBtn.onclick = hideModal;
        }

        async function addExpense() {
            if (!isAuthReady || !userId) {
                showModal("Error de Autenticación", "Por favor, espera a que la autenticación termine.");
                return;
            }

            const description = expenseDescriptionInput.value.trim();
            const amountBs = parseFloat(expenseAmountBsInput.value) || 0;
            const amountUsd = parseFloat(expenseAmountUsdInput.value) || 0;
            const methodBs = expenseMethodBs.value.trim(); 

            if (description === '' || (amountBs <= 0 && amountUsd <= 0)) {
                showModal("Datos Incompletos", "Debes ingresar una descripción y al menos un monto (Bs o Divisa) mayor a cero.", true);
                return;
            }
            
            if (amountBs > 0 && methodBs === '') {
                showModal("Datos Incompletos", "Debes seleccionar un Método de Egreso si registras un Monto en Bolívares.", true);
                return;
            }

            addExpenseBtn.disabled = true;
            addExpenseBtn.innerHTML = `<span class="spinner"></span> Registrando...`;

            const collectionPath = `companies/${companyId}/branches/${branchId}/cashiers/${userId}/gestiondegastos`;

            try {
                const newExpense = {
                    description: description,
                    amountBs: amountBs,
                    methodBs: amountBs > 0 ? methodBs : 'N/A', 
                    amountUsd: amountUsd,
                    methodUsd: amountUsd > 0 ? 'Divisa' : 'N/A', 
                    branchId: branchId,
                    cashierId: userId,
                    timestamp: serverTimestamp() 
                };
                
                await addDoc(collection(db, collectionPath), newExpense);
                
                showModal("Éxito", "Gasto registrado correctamente.");
                
                expenseDescriptionInput.value = '';
                expenseAmountBsInput.value = '0';
                expenseMethodBs.value = ''; 
                expenseMethodBsGroup.classList.add('hidden'); 
                expenseAmountUsdInput.value = '0';

            } catch (error) {
                console.error("Error al registrar gasto:", error);
                showModal("Error al Guardar", `No se pudo registrar el gasto. Error: ${error.message}. Verifica tus permisos.`, true);
            } finally {
                addExpenseBtn.disabled = false;
                addExpenseBtn.innerHTML = `<span class="material-icons mr-2">remove_circle_outline</span> Agregar Gasto`;
            }
        }

        function loadExpenses() {
            if (!userId || !companyId || !branchId) {
                expenseList.innerHTML = `<tr><td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">Esperando autenticación...</td></tr>`;
                return;
            }
            
            const collectionPath = `companies/${companyId}/branches/${branchId}/cashiers/${userId}/gestiondegastos`;
            const expensesRef = collection(db, collectionPath);
            
            const q = query(expensesRef); 

            onSnapshot(q, (snapshot) => {
                let totalBs = 0;
                let html = '';
                
                if (snapshot.empty) {
                    html = `<tr><td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center"> No hay gastos registrados.</td></tr>`;
                } else {
                    
                    const expenses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    expenses.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                    expenses.forEach(doc => {
                        totalBs += doc.amountBs || 0;
                        
                        const timestamp = doc.timestamp ? doc.timestamp.toDate() : new Date();
                        const formattedDate = timestamp.toLocaleString('es-VE', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: '2-digit', 
                            hour: '2-digit', 
                            minute: '2-digit' 
                        });

                        const methodBsDisplay = doc.methodBs || 'N/A';
                        const amountUsdDisplay = (doc.amountUsd || 0).toFixed(2);


                        html += `
                            <tr class="hover:bg-gray-50 transition duration-100">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${doc.description}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-red-600 font-semibold">${(doc.amountBs || 0).toFixed(2)} Bs</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${methodBsDisplay}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-red-800 font-semibold">${amountUsdDisplay} USD</td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${formattedDate}</td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <span class="text-gray-400">Sin acciones (Registro final)</span>
                                </td>
                            </tr>
                        `;
                    });
                }

                expenseList.innerHTML = html;
                totalExpenseDisplay.textContent = `Bs ${totalBs.toFixed(2)}`;

            }, (error) => {
                console.error("Error al obtener gastos:", error);
                expenseList.innerHTML = `<tr><td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-red-500 text-center">Error al cargar datos. Verifica la consola y los permisos.</td></tr>`;
            });
        }

        function setupEventListeners() {
            if (addExpenseBtn) {
                addExpenseBtn.addEventListener('click', addExpense);
            }
            
            if (expenseAmountBsInput && expenseMethodBsGroup) {
                expenseAmountBsInput.addEventListener('input', () => {
                    const amountBs = parseFloat(expenseAmountBsInput.value) || 0;
                    if (amountBs > 0) {
                        expenseMethodBsGroup.classList.remove('hidden');
                    } else {
                        expenseMethodBsGroup.classList.add('hidden');
                        expenseMethodBs.value = ''; 
                    }
                });
            }
        }


        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const idTokenResult = await user.getIdTokenResult();
                    
                    userId = user.uid;
                    companyId = idTokenResult.claims.companyId;
                    branchId = idTokenResult.claims.branchId; 
                    role = (idTokenResult.claims.role || 'N/A').toLowerCase(); 

                    if (userIdDisplay) userIdDisplay.textContent = userId;
                    if (companyIdDisplay) companyIdDisplay.textContent = companyId;
                    if (roleDisplay) roleDisplay.textContent = role;
                    
                    console.log(`Usuario autenticado: ${userId} en Compañía: ${companyId}`);

                    isAuthReady = true;
                    setupEventListeners();
                    loadExpenses(); 

                } catch (error) {
                    console.error("Error al procesar el token:", error);
                    if (userIdDisplay) userIdDisplay.textContent = 'ERROR';
                    if (companyIdDisplay) companyIdDisplay.textContent = 'ERROR';
                    if (roleDisplay) roleDisplay.textContent = 'ERROR';
                }
            } else {
                userId = null;
                companyId = null;
                branchId = null; 
                role = null; 
                isAuthReady = false;
                
                if (userIdDisplay) userIdDisplay.textContent = 'N/A';
                if (companyIdDisplay) companyIdDisplay.textContent = 'N/A';
                if (roleDisplay) roleDisplay.textContent = 'N/A';
            }
        });

        async function startAuth() {
            if (initialAuthToken) {
                try {
                    await signInWithCustomToken(auth, initialAuthToken);
                } catch (error) {
                    console.error("Token personalizado falló. Intentando con anónimo (Si el token es requerido, esto fallará más tarde):", error);
                    await signInAnonymously(auth); 
                }
            } else {
                await signInAnonymously(auth);
            }
        }

        startAuth();
    </script>
</body>
</html>
