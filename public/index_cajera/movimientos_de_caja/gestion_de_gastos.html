<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS POS - Gestión de Gastos</title>
    <link rel="icon" type="image/png" href="https://placehold.co/16x16/000000/FFFFFF?text=NX">
    <script src="tailwindcss.js"></script>
    <link href="../node_modules/material-icons/iconfont/material-icons.css" rel="stylesheet">
    <link href="../node_modules/@fontsource/roboto/index.css" rel="stylesheet">

    <style>
        body {
    font-family: 'Roboto', sans-serif;
    background-color: #ffffff;
    margin: 0;
    padding: 0;
    height: 100vh; /* Ocupa toda la altura de la ventana */
    overflow: hidden; /* Evita el scroll doble en la página */
}

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            position: relative;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-content {
            transform: translateY(0);
        }

        .modal-close-button {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4a5568;
            transition: color 0.2s ease;
        }

        .modal-close-button:hover {
            color: #1a202c;
        }
        
        .user-info-display {
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.75;
            color: #1f2937;
        }
        .user-info-display .label {
            font-weight: normal;
        }
        .user-info-display .value {
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-white overflow-hidden"> 
    <main class="flex flex-col w-full h-screen bg-white"> 
        <div class="p-6 pb-2 shrink-0">
            <h2 class="text-3xl font-bold text-gray-800 text-center flex items-center justify-center mb-6">
                <span class="material-icons text-red-600 mr-3 text-4xl">receipt_long</span>
                Gestión de Gastos
            </h2>

            <div class="mb-8 p-6 border border-gray-200 rounded-lg shadow-sm">
                <h3 class="text-xl font-semibold mb-4 text-gray-700">Registrar Nuevo Gasto</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label for="expense-description" class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
                        <input type="text" id="expense-description"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. Pago a proveedor">
                    </div>
                    <div>
                        <label for="expense-amount-bs" class="block text-sm font-medium text-gray-700 mb-2">Monto (Bs)</label>
                        <input type="number" id="expense-amount-bs" step="0.01" min="0"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. 75.00">
                    </div>
                    <div id="expense-method-bs-group" class="hidden">
                        <label for="expense-method-bs" class="block text-sm font-medium text-gray-700 mb-2">Método Egreso (Bs)</label>
                        <select id="expense-method-bs"
                                class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5">
                            <option value="">-- Seleccionar --</option>
                            <option value="Efectivo">Efectivo</option>
                            <option value="Tarjeta de Débito">Tarjeta de Débito</option>
                            <option value="Pago Móvil">Pago Móvil</option>
                            <option value="Transferencia">Transferencia</option>
                            <option value="Depósito">Depósito</option>
                            <option value="Crédito">Crédito</option>
                            <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                            <option value="Zelle">Zelle</option>
                            <option value="PayPal">PayPal</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label for="expense-amount-usd" class="block text-sm font-medium text-gray-700 mb-2">Monto (Divisa)</label>
                        <input type="number" id="expense-amount-usd" step="0.01" min="0"
                               class="block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-1 focus:ring-red-500 sm:text-base p-2.5"
                               placeholder="Ej. 2.50">
                    </div>
                </div>
                <button id="add-expense-btn"
                        class="mt-6 w-full bg-red-600 text-white py-3 px-6 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition duration-150 ease-in-out text-lg font-semibold shadow-md flex items-center justify-center">
                    <span class="material-icons mr-2">remove_circle_outline</span>
                    Agregar Gasto
                </button>
            </div>

            </div> <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col">
            <div class="flex-1 border border-gray-200 rounded-lg shadow-sm flex flex-col overflow-hidden bg-white">
                
                <h3 class="text-xl font-semibold p-4 border-b border-gray-200 text-gray-700 flex items-center justify-between shrink-0">
                    Gastos Registrados
                    <span id="total-expense-display" class="text-red-700 text-2xl font-bold">Bs 0.00</span>
                </h3>
                
                <div class="flex-1 overflow-y-auto">
                    <table class="min-w-full divide-y divide-gray-200 relative">
                        <thead class="bg-gray-50 sticky top-0 z-10"> 
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tl-lg">
                                    Descripción
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Monto (Bs)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Método (Bs)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Monto (Divisa)
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Fecha
                                </th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider rounded-tr-lg">
                                    Acciones
                                </th>
                            </tr>
                        </thead>
                        <tbody id="expense-list" class="bg-white divide-y divide-gray-200">
                            <tr>
                                <td colspan="6" class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-center">
                                    No hay gastos registrados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="info-message-modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-info-message-modal" class="modal-close-button">
                <span class="material-icons">close</span>
            </button>
            <h3 id="info-message-title" class="text-xl font-bold mb-4 text-gray-800 text-center"></h3>
            <p id="info-message-text" class="text-gray-700 mb-6 text-center whitespace-pre-line"></p>
            <div class="flex justify-center">
                <button id="info-message-ok-btn" class="bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition duration-150">Aceptar</button>
            </div>
        </div>
    </div>

<script type="module">
    // --- 1. ESTADO GLOBAL Y REFERENCIAS ---
    let userId = null; 
    let companyId = null; 
    let branchId = null; 
    let isAuthReady = false;

    // Referencias al DOM
    const expenseList = document.getElementById('expense-list');
    const totalExpenseDisplay = document.getElementById('total-expense-display');
    const expenseDescriptionInput = document.getElementById('expense-description');
    const expenseAmountBsInput = document.getElementById('expense-amount-bs');
    const expenseMethodBsGroup = document.getElementById('expense-method-bs-group'); 
    const expenseMethodBs = document.getElementById('expense-method-bs'); 
    const expenseAmountUsdInput = document.getElementById('expense-amount-usd');
    const addExpenseBtn = document.getElementById('add-expense-btn');

    const modalOverlay = document.getElementById('info-message-modal-overlay');
    const modalTitle = document.getElementById('info-message-title');
    const modalText = document.getElementById('info-message-text');

    // --- 2. INICIALIZACIÓN DE SESIÓN LOCAL ---
    async function inicializarModulo() {
        try {
            const sesion = await window.nexusAPI.obtenerSesionLocal();
            
            if (sesion) {
                userId = sesion.uid;
                companyId = sesion.companyId;
                branchId = sesion.branchId;
                isAuthReady = true;
                
                console.log("✅ Conexión establecida con el Cerebro Local (Gastos).");
                loadExpenses(); // Cargar historial local
            } else {
                showModal("Sesión no válida", "Por favor, inicia sesión de nuevo.", true);
            }
        } catch (error) {
            console.error("Error al inicializar sesión local:", error);
        }
    }

    // --- 3. LÓGICA DE REGISTRO (GUARDAR EN SQLITE) ---
async function addExpense() {
    if (!isAuthReady) {
        showModal("Sistema Ocupado", "El módulo aún está cargando la base de datos local. Espera un segundo.", true);
        return;
    }
    if (!userId) {
        showModal("Error de Sesión", "No se detectó la identidad del cajero. Vuelve al Login.", true);
        return;
    }
    if (!window.nexusAPI || typeof window.nexusAPI.guardarMovimientoCaja !== 'function') {
        showModal("Fallo de Puente", "El HTML no puede ver a preload.js", true);
        return;
    }

    const description = expenseDescriptionInput.value.trim();
    const amountBs = parseFloat(expenseAmountBsInput.value) || 0;
    const amountUsd = parseFloat(expenseAmountUsdInput.value) || 0;
    const methodBs = expenseMethodBs.value.trim();

    if (description === '' || (amountBs <= 0 && amountUsd <= 0)) {
        showModal("Datos Incompletos", "Debes ingresar una descripción y un monto válido.", true);
        return;
    }

    if (amountBs > 0 && methodBs === '') {
        showModal("Falta Método", "Selecciona de dónde salió el dinero en Bolívares.", true);
        return;
    }

    addExpenseBtn.disabled = true;
    addExpenseBtn.innerHTML = `<span class="spinner"></span> Registrando...`;

    try {
        const nuevoMovimiento = {
            id: `EXP-${Date.now()}`,
            tipo: 'GASTO',
            concepto: description,
            monto: amountBs,
            monto_usd: amountUsd,
            metodo_pago: amountBs > 0 ? methodBs : 'DIVISA',
            fecha: new Date().toISOString(),
            cashier_id: userId,
            company_id: companyId,
            branch_id: branchId || 'SUC-01'
        };

        const resultado = await window.nexusAPI.guardarMovimientoCaja(nuevoMovimiento);

        if (resultado && !resultado.error) {
            showModal("Éxito", "Gasto guardado localmente para el Cierre Z.");
            
            // 🔥 AQUÍ LLAMAMOS A LA IMPRESORA CON LOS DATOS DEL GASTO 🔥
            if (typeof imprimirReciboGasto === 'function') {
                await imprimirReciboGasto({
                    concepto: description,
                    montoBs: amountBs,
                    metodoBs: methodBs,
                    montoUsd: amountUsd
                });
            }

            limpiarCampos();
            loadExpenses();
        } else {
            throw new Error(resultado.error || "SQLite rechazó la inserción.");
        }
    } catch (error) {
        showModal("Error SQL", `Fallo interno: ${error.message}`, true);
    } finally {
        addExpenseBtn.disabled = false;
        addExpenseBtn.innerHTML = `<span class="material-icons mr-2">remove_circle_outline</span> Registrar Gasto`;
    }
}

    // --- 4. CARGA DE DATOS (LECTURA DESDE SQLITE) ---
    async function loadExpenses() {
        if (!companyId) return;
        
        try {
            // Consultamos solo los GASTOS pendientes de cierre
            const gastos = await window.nexusAPI.obtenerMovimientosCaja({ 
                tipo: 'GASTO', 
                companyId: companyId 
            });

            let totalBs = 0;
            let html = '';
            
            if (!gastos || gastos.length === 0) {
                html = `<tr><td colspan="6" class="px-6 py-4 text-sm text-gray-500 text-center">No hay gastos registrados en esta sesión.</td></tr>`;
            } else {
                // Ordenar por fecha descendente
                gastos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

                gastos.forEach(mov => {
                    totalBs += mov.monto || 0;
                    const fechaLocal = new Date(mov.fecha).toLocaleString('es-VE');

                    html += `
                        <tr class="hover:bg-gray-50 transition duration-75">
                            <td class="px-6 py-4 text-sm font-medium text-gray-900">${mov.concepto}</td>
                            <td class="px-6 py-4 text-sm text-red-600 font-bold">${mov.monto.toFixed(2)} Bs</td>
                            <td class="px-6 py-4 text-sm text-gray-700">${mov.metodo_pago}</td>
                            <td class="px-6 py-4 text-sm text-red-800 font-semibold">${mov.monto_usd.toFixed(2)} USD</td>
                            <td class="px-6 py-4 text-sm text-gray-500">${fechaLocal}</td>
                            <td class="px-6 py-4 text-right">
                                <span class="text-[10px] bg-red-100 text-red-700 px-2 py-1 rounded-full font-black uppercase">Local</span>
                            </td>
                        </tr>
                    `;
                });
            }

            expenseList.innerHTML = html;
            totalExpenseDisplay.textContent = `Bs ${totalBs.toFixed(2)}`;

        } catch (error) {
            console.error("Error al cargar movimientos locales:", error);
        }
    }

    // --- 5. UTILIDADES DE INTERFAZ ---
    function limpiarCampos() {
        expenseDescriptionInput.value = '';
        expenseAmountBsInput.value = '0';
        expenseAmountUsdInput.value = '0';
        expenseMethodBs.value = '';
        expenseMethodBsGroup.classList.add('hidden');
    }

    function showModal(title, message, isError = false) {
    if (!modalOverlay) return;
    modalTitle.textContent = title;
    modalText.textContent = message;
    // Si es error usamos un rojo más oscuro (red-800), si es éxito usamos el rojo estándar (red-600)
    modalTitle.className = `text-xl font-bold mb-4 text-center ${isError ? 'text-red-800' : 'text-red-600'}`;
    modalOverlay.classList.add('open');
}

    // --- 6. EVENTOS DIRECTOS (Sin bloqueos) ---
    
    // Arrancamos el módulo inmediatamente
    inicializarModulo();

    // Asignación de clics
    if (addExpenseBtn) {
        addExpenseBtn.addEventListener('click', addExpense);
    }
    
    // Mostrar/ocultar métodos de pago según el monto en BS
    if (expenseAmountBsInput) {
        expenseAmountBsInput.addEventListener('input', () => {
            const val = parseFloat(expenseAmountBsInput.value) || 0;
            expenseMethodBsGroup.classList.toggle('hidden', val <= 0);
            if (val <= 0) expenseMethodBs.value = ''; 
        });
    }

    // Modales
    document.getElementById('close-info-message-modal')?.addEventListener('click', () => modalOverlay.classList.remove('open'));
    document.getElementById('info-message-ok-btn')?.addEventListener('click', () => modalOverlay.classList.remove('open'));

// --- FUNCIÓN PARA IMPRIMIR RECIBO DE GASTO ---
async function imprimirReciboGasto(gastoData) {
    let printerName = null;
    let printerSize = "58"; 
    try {
        const configDataRaw = await window.nexusAPI.obtenerConfiguracion('config_factura');
        if (configDataRaw) {
            const configFactura = JSON.parse(configDataRaw);
            printerName = configFactura.impresoraSeleccionada;
            if(configFactura.tamañoImpresora) printerSize = configFactura.tamañoImpresora;
        }
    } catch (e) {
        console.warn("⚠️ No se pudo leer la configuración de la impresora.");
    }

    if (!printerName) {
        console.warn("No hay impresora configurada. Se omite impresión del recibo.");
        return;
    }

    const LINE_WIDTH = (printerSize === "80") ? 48 : 32;
    const CRLF = "\r\n";
    const SEPARATOR = "-".repeat(LINE_WIDTH) + CRLF;

    const centerText = (text, width) => {
        if (!text) return "";
        const str = text.toString().substring(0, width);
        const pad = Math.floor((width - str.length) / 2);
        return str.padStart(pad + str.length).padEnd(width);
    };

    const formatLR = (left, right, width) => {
        const l = left.toString();
        const r = right.toString();
        const space = width - l.length - r.length;
        return space > 0 ? l + " ".repeat(space) + r : (l + " " + r).substring(0, width);
    };

    let t = "\x1B\x40"; // Resetear impresora
    
    t += centerText("RECIBO DE EGRESO (GASTO)", LINE_WIDTH) + CRLF;
    t += SEPARATOR;
    t += `FECHA: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}${CRLF}`;
    t += SEPARATOR;
    
    t += `CONCEPTO:${CRLF}`;
    const conceptoStr = gastoData.concepto.toUpperCase();
    for (let i = 0; i < conceptoStr.length; i += LINE_WIDTH) {
        t += conceptoStr.substring(i, i + LINE_WIDTH) + CRLF;
    }
    t += SEPARATOR;

    if (gastoData.montoBs > 0) {
        t += formatLR("MONTO BS:", gastoData.montoBs.toFixed(2), LINE_WIDTH) + CRLF;
        t += formatLR("MÉTODO:", (gastoData.metodoBs || "N/A").toUpperCase(), LINE_WIDTH) + CRLF;
    }

    if (gastoData.montoUsd > 0) {
        if (gastoData.montoBs > 0) t += CRLF; 
        t += formatLR("MONTO USD ($):", gastoData.montoUsd.toFixed(2), LINE_WIDTH) + CRLF;
        t += formatLR("MÉTODO:", "EFECTIVO", LINE_WIDTH) + CRLF;
    }

    t += SEPARATOR;
    t += CRLF.repeat(2);
    t += centerText("________________________", LINE_WIDTH) + CRLF;
    t += centerText("FIRMA AUTORIZADA", LINE_WIDTH) + CRLF;
    t += CRLF.repeat(2);
    t += centerText("________________________", LINE_WIDTH) + CRLF;
    t += centerText("RECIBÍ CONFORME", LINE_WIDTH) + CRLF;

    // 🔥 LÓGICA DE CORTE EXACTA
    if (printerSize === "80") {
        t += CRLF.repeat(2) + "\x1B\x6D"; 
    } else {
        t += CRLF.repeat(2) + "\x1B\x6D"; 
    }

    try {
        await window.nexusAPI.imprimirTextoLibre(t, printerName);
    } catch (error) {
        console.error("Error imprimiendo recibo de gasto:", error);
    }
}

</script>
</body>
</html>
