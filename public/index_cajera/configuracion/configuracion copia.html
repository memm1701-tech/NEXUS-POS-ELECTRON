<div class="flex justify-center items-start w-full min-h-screen p-6">
    <div class="bg-white p-8 rounded-xl shadow-md w-full space-y-6 text-center">
        <h1 class="text-3xl font-bold text-gray-800">Configuración de Factura y Hardware</h1>

        <div class="space-y-4 text-left p-4 border border-gray-200 bg-gray-50 rounded-md">
            <h2 class="text-lg font-semibold text-gray-800">Encabezado de Factura (Normativa SENIAT)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label for="configLine1" class="block text-sm font-medium text-gray-700">Línea 1 (Razón Social):</label>
                    <input type="text" id="configLine1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: Inversiones Nexus C.A.">
                </div>
                <div class="space-y-2">
                    <label for="configLine2" class="block text-sm font-medium text-gray-700">Línea 2 (Nombre Comercial):</label>
                    <input type="text" id="configLine2" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: Nexus POS Global">
                </div>
                <div class="space-y-2">
                    <label for="configLine3" class="block text-sm font-medium text-gray-700">Línea 3 (RIF / C.I.):</label>
                    <input type="text" id="configLine3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: J-12345678-9">
                </div>
                <div class="space-y-2">
                    <label for="configLine4" class="block text-sm font-medium text-gray-700">Línea 4 (Domicilio Fiscal):</label>
                    <input type="text" id="configLine4" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: Av. Bolívar, Local 4, Valencia">
                </div>
                <div class="space-y-2">
                    <label for="configLine5" class="block text-sm font-medium text-gray-700">Línea 5 (Teléfono / Correo):</label>
                    <input type="text" id="configLine5" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: 0414-1234567 / info@nexus.com">
                </div>
                <div class="space-y-2">
                    <label for="configLine6" class="block text-sm font-medium text-gray-700">Línea 6 (Sucursal / Opcional):</label>
                    <input type="text" id="configLine6" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: Sucursal Centro">
                </div>
            </div>
        </div>
        
        <div class="p-4 border-b border-gray-200 text-left">
            <label for="config-multicurrency" class="flex items-center justify-between text-gray-700 font-medium cursor-pointer">
                <span class="text-lg">Habilitar Factura Multimoneda (Bs / Divisa)</span>
                <input type="checkbox" id="config-multicurrency" class="h-5 w-5 text-yellow-600 border-gray-300 rounded focus:ring-yellow-500">
            </label>
        </div>

        <div class="space-y-4 text-left p-4 border border-gray-200 bg-gray-50 rounded-md">
            <div class="flex items-center justify-between mb-2 border-b pb-2">
                <div>
                    <h2 class="text-lg font-semibold text-gray-800">Báscula / Balanza (Puerto COM)</h2>
                    <p class="text-xs text-gray-500">Conexión serial directa con el hardware de pesaje.</p>
                </div>
                <label for="config-enable-scale" class="flex items-center cursor-pointer">
                    <span class="mr-2 text-sm font-bold text-gray-700">Habilitar:</span>
                    <input type="checkbox" id="config-enable-scale" class="h-6 w-6 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                </label>
            </div>
            <div class="space-y-2">
                <label for="scaleVpsUrl" class="block text-sm font-medium text-gray-700">Seleccione el Puerto COM de la Balanza:</label>
                <select id="scaleVpsUrl" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm bg-white">
                    <option value="">Cargando puertos USB/COM...</option>
                </select>
            </div>
        </div>

        <div class="space-y-4 text-left p-4 border border-gray-200 bg-gray-50 rounded-md">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">Impresora de Tickets (Windows/OS)</h2>
                <p class="text-xs text-gray-500">Seleccione la impresora térmica instalada en su equipo.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label for="printer-select" class="block text-sm font-medium text-gray-700">Impresora:</label>
                    <select id="printer-select" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm bg-white">
                        <option value="">Cargando impresoras...</option>
                    </select>
                </div>
                <div class="space-y-2">
                    <label for="printer-size-select" class="block text-sm font-medium text-gray-700">Tamaño de Papel:</label>
                    <select id="printer-size-select" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm bg-white">
                        <option value="58">58 mm (Por Defecto)</option>
                        <option value="80">80 mm</option>
                    </select>
                </div>
            </div>
        </div>
        
        <button id="saveConfigBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-md shadow-lg transition duration-300 ease-in-out">
            Guardar Configuración
        </button>

        <p id="messageBox" class="text-center mt-4 font-semibold"></p>
    </div>
</div>

<script type="module">
    let userId = null;
    let companyId = null;
    let branchId = null; 
    let cashierId = null; 

    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const messageBox = document.getElementById('messageBox');
    
    // Selectores de Hardware
    const printerSelect = document.getElementById('printer-select');
    const printerSizeSelect = document.getElementById('printer-size-select');
    const scaleVpsUrl = document.getElementById('scaleVpsUrl'); 
    
    // Campos SENIAT
    const configLine1 = document.getElementById('configLine1');
    const configLine2 = document.getElementById('configLine2');
    const configLine3 = document.getElementById('configLine3');
    const configLine4 = document.getElementById('configLine4');
    const configLine5 = document.getElementById('configLine5');
    const configLine6 = document.getElementById('configLine6');   
    
    // Checkboxes
    const enableScaleCheckbox = document.getElementById('config-enable-scale'); 
    const multicurrencyCheckbox = document.getElementById('config-multicurrency');

    function showMessage(message, color) {
        if (!messageBox) return;
        messageBox.textContent = message;
        messageBox.style.color = color;
    }

    // 1. Obtiene los Puertos COM físicos (Solo para la Báscula)
    async function getPuertosCOM() {
        try {
            if (!window.nexusAPI || typeof window.nexusAPI.leerPuertos !== 'function') return [];
            const ports = await window.nexusAPI.leerPuertos();
            scaleVpsUrl.innerHTML = '<option value="">Seleccione el puerto...</option>';
            
            if (ports && ports.length > 0) {
                ports.forEach(port => {
                    const opt = document.createElement('option');
                    opt.value = port.path;
                    opt.textContent = `${port.path} ${port.manufacturer ? '('+port.manufacturer+')' : ''}`;
                    scaleVpsUrl.appendChild(opt);
                });
                return ports.map(p => p.path);
            } else {
                scaleVpsUrl.innerHTML = '<option value="">No hay puertos COM conectados</option>';
                return [];
            }
        } catch (error) {
            console.error("Error al leer puertos COM:", error);
            return [];
        }
    }

    // 2. Obtiene las Impresoras del Sistema Operativo (Windows/OS)
    async function getImpresorasOS() {
        try {
            if (!window.nexusAPI || typeof window.nexusAPI.leerImpresoras !== 'function') return [];
            const impresoras = await window.nexusAPI.leerImpresoras();
            printerSelect.innerHTML = '<option value="">Seleccione su impresora...</option>';
            
            if (impresoras && impresoras.length > 0) {
                impresoras.forEach(imp => {
                    const opt = document.createElement('option');
                    opt.value = imp.name; 
                    opt.textContent = imp.name + (imp.isDefault ? ' (Predeterminada)' : '');
                    printerSelect.appendChild(opt);
                });
                return impresoras.map(i => i.name);
            } else {
                printerSelect.innerHTML = '<option value="">No hay impresoras instaladas</option>';
                return [];
            }
        } catch (error) {
            console.error("Error al leer Impresoras:", error);
            return [];
        }
    }
    
    // Función para cargar las configuraciones guardadas
    async function loadAllConfigs(puertosCOMValidos, impresorasValidas) {
        if (!companyId || !branchId || !cashierId) {
            showMessage("Error de sesión. No se puede cargar la configuración.", 'red');
            return;
        }

        let facturaLoaded = false;
        let basculaLoaded = false;

        // --- Cargar Factura e Impresora ---
        try {
            const facturaDataRaw = await window.nexusAPI.obtenerConfiguracion('config_factura');
            if (facturaDataRaw) {
                const data = JSON.parse(facturaDataRaw);
                const savedPrinter = data.impresoraSeleccionada;
                const savedPrinterSize = data.tamañoImpresora; 
                const headerConfig = data.encabezadoFactura; 
                const enableMulticurrency = data.enableMulticurrency; 
                
                // Cargar Impresora si sigue instalada en Windows
                if (savedPrinter && impresorasValidas.includes(savedPrinter)) {
                    printerSelect.value = savedPrinter;
                }
                
                if (printerSizeSelect) {
                    const validSizes = ['58', '80'];
                    printerSizeSelect.value = (savedPrinterSize && validSizes.includes(savedPrinterSize)) ? savedPrinterSize : '58';
                }
                
                if (headerConfig) {
                    configLine1.value = headerConfig.line1 || '';
                    configLine2.value = headerConfig.line2 || '';
                    configLine3.value = headerConfig.line3 || '';
                    configLine4.value = headerConfig.line4 || '';
                    configLine5.value = headerConfig.line5 || '';
                    configLine6.value = headerConfig.line6 || '';
                }
                
                if (multicurrencyCheckbox) multicurrencyCheckbox.checked = (enableMulticurrency === true);
                
                facturaLoaded = true;
            } else {
                if (multicurrencyCheckbox) multicurrencyCheckbox.checked = false; 
            }
        } catch (error) {
            console.error("Error al cargar Factura:", error);
        }

        // --- Cargar Báscula ---
        try {
            const basculaDataRaw = await window.nexusAPI.obtenerConfiguracion('config_bascula');
            if (basculaDataRaw) {
                const data = JSON.parse(basculaDataRaw);
                const savedPort = data.puertoCOM;
                
                // Cargar Puerto COM si sigue conectado físicamente
                if (savedPort && puertosCOMValidos.includes(savedPort)) {
                    scaleVpsUrl.value = savedPort;
                }
                
                if (enableScaleCheckbox) {
                     enableScaleCheckbox.checked = data.enableScale || false;
                }
                basculaLoaded = true;
            } else {
                if (enableScaleCheckbox) enableScaleCheckbox.checked = false; 
            }
        } catch (error) {
            console.error("Error al cargar Báscula:", error);
        }
        
        if (facturaLoaded || basculaLoaded) {
            showMessage(`✅ Configuración cargada correctamente.`, 'green');
        } else {
            showMessage("Ajuste los parámetros y presione Guardar.", 'blue');
        }
    }
 
    async function verificarAutenticacionLocal() {
        try {
            const sesion = await window.nexusAPI.obtenerSesionLocal();
            if (sesion && sesion.companyId) {
                userId = sesion.uid;
                companyId = sesion.companyId;
                branchId = sesion.branchId; 
                cashierId = sesion.uid; 

                // Ejecutamos ambas lecturas en paralelo
                showMessage("Escaneando hardware del sistema...", 'blue');
                const [puertos, impresoras] = await Promise.all([
                    getPuertosCOM(),
                    getImpresorasOS()
                ]);

                await loadAllConfigs(puertos, impresoras); 
            } else {
                userId = null;
                companyId = null;
                branchId = null; 
                cashierId = null; 
            }
        } catch (error) {
            console.error("Error de sesión:", error);
            showMessage("Error de lectura local. Revisa la consola.", 'red');
        }
    }

    verificarAutenticacionLocal();

    async function saveFacturaConfiguration() {
        const selectedPrinter = printerSelect.value;
        const selectedPrinterSize = printerSizeSelect ? printerSizeSelect.value : '58';
        const enableMulticurrencyState = multicurrencyCheckbox ? multicurrencyCheckbox.checked : false;

        const facturaData = {
            ultimoCambio: new Date().toISOString(),
            configuracionEjemplo: {
                iva: 0.16, 
                moneda: 'Bs',
                prefijoFactura: 'FAC'
            },
            impresoraSeleccionada: selectedPrinter || "", 
            tamañoImpresora: selectedPrinterSize, 
            modificadoPor: userId,
            encabezadoFactura: {
                line1: configLine1.value.trim() || "",
                line2: configLine2.value.trim() || "",
                line3: configLine3.value.trim() || "",
                line4: configLine4.value.trim() || "",
                line5: configLine5.value.trim() || "",
                line6: configLine6.value.trim() || ""
            },
            useSearchOnType: false, 
            enableMulticurrency: enableMulticurrencyState 
        };

        await window.nexusAPI.guardarConfiguracion('config_factura', JSON.stringify(facturaData));
        return true;
    }

    async function saveBasculaConfiguration() {
        const comPortToSave = scaleVpsUrl.value; 
        const enableScaleState = enableScaleCheckbox ? enableScaleCheckbox.checked : false;
        
        const basculaData = {
            ultimoCambio: new Date().toISOString(),
            modificadoPor: userId,
            puertoCOM: comPortToSave || "", 
            baudRate: 9600,           
            enableScale: enableScaleState 
        };

        await window.nexusAPI.guardarConfiguracion('config_bascula', JSON.stringify(basculaData));
        return true;
    }

    async function saveConfiguration() {
        if (!userId || !companyId || !branchId || !cashierId) {
            showMessage("Error: Sesión no válida, no se puede guardar.", 'red');
            return;
        }

        let facturaSuccess = false;
        let basculaSuccess = false;

        showMessage("Guardando configuración...", 'blue');

        try {
            facturaSuccess = await saveFacturaConfiguration();
            basculaSuccess = await saveBasculaConfiguration();
        } catch (error) {
            console.error("Error al guardar:", error);
        }

        if (facturaSuccess && basculaSuccess) {
            showMessage("✅ Configuración guardada correctamente en el equipo.", 'green');
        } else {
            showMessage("❌ Hubo un problema al guardar. Revisa la consola.", 'red');
        }
    }
    
    saveConfigBtn.addEventListener('click', saveConfiguration);
</script>
