<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS POS - Gestión de Clientes</title>
    <script src="tailwindcss.js"></script>
    <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link href="../node_modules/@fontsource/roboto/index.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
        
        /* Asegura que el encabezado sea sólido al desplazar la tabla */
        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: #f9fafb;
            box-shadow: inset 0 -1px 0 #e5e7eb;
        }

        /* Scrollbar estilo Nexus POS */
        .overflow-y-auto::-webkit-scrollbar { width: 6px; }
        .overflow-y-auto::-webkit-scrollbar-track { background: #f1f1f1; }
        .overflow-y-auto::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="bg-white overflow-hidden"> 
    <main class="flex flex-col w-full h-screen bg-white"> 
        
        <div class="p-6 pb-2 shrink-0">
            <div class="flex justify-between items-end mb-6">
                <h1 class="text-3xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-users text-indigo-600 mr-3 text-4xl"></i>
                    Gestión de Clientes
                </h1>
            </div>

            <form id="client-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4 relative z-20 shadow-inner">
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Cédula / RIF</label>
                    <input type="text" id="client-rif" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none uppercase font-bold" placeholder="V-12345678" required>
                </div>
                
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre o Razón Social</label>
                    <input type="text" id="client-name" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none uppercase" placeholder="Ej. Juan Pérez / Empresa C.A." required>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Teléfono</label>
                    <input type="text" id="client-phone" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. 0414-1234567">
                </div>

                <div class="md:col-span-3">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Dirección Fiscal</label>
                    <input type="text" id="client-address" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Dirección detallada del cliente...">
                </div>
                
                <div class="flex items-end gap-2">
                    <button type="submit" id="btn-save-client" class="flex-1 bg-indigo-600 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-md">
                        <i class="fas fa-save mr-2"></i> <span id="btn-save-text">Guardar</span>
                    </button>
                    <button type="button" id="btn-cancel-edit" class="hidden bg-gray-500 text-white font-bold py-2.5 px-4 rounded-lg hover:bg-gray-600 transition shadow-md" title="Cancelar Edición">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="flex-1 overflow-hidden px-6 pb-6 flex flex-col">
            <div class="flex-1 border border-gray-200 rounded-lg shadow-sm flex flex-col overflow-hidden bg-white">
                
                <h3 class="text-xl font-semibold p-4 border-b border-gray-200 text-gray-700 flex items-center justify-between shrink-0">
                    Directorio Local de Clientes
                </h3>
                
                <div class="flex-1 overflow-y-auto">
                    <table class="min-w-full divide-y divide-gray-200 relative">
                        <thead class="bg-gray-50 sticky top-0 z-10">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Cédula/RIF</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Nombre</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Teléfono</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Dirección</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="clients-table-body" class="bg-white divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // --- 1. ESTADO GLOBAL ---
        let companyId = null;
        let editingClientRif = null;

        // Referencias DOM
        const clientForm = document.getElementById('client-form');
        const clientsTableBody = document.getElementById('clients-table-body');
        const btnSaveText = document.getElementById('btn-save-text');
        const btnCancelEdit = document.getElementById('btn-cancel-edit');
        const rifInput = document.getElementById('client-rif');

        // --- 2. INICIALIZACIÓN ---
        async function initModuloClientes() {
            try {
                const sesion = await window.nexusAPI.obtenerSesionLocal();
                if (sesion) {
                    companyId = sesion.companyId;
                    console.log("✅ Conexión con SQLite establecida (Clientes).");
                    fetchClients(); 
                } else {
                    showCustomAlert("Error de sesión local.", 'error');
                }
            } catch (error) {
                console.error("Error al iniciar módulo:", error);
            }
        }

        // --- 3. LÓGICA CRUD ---
        async function fetchClients() {
            try {
                const clientes = await window.nexusAPI.obtenerClientesLocal();
                renderClients(clientes);
            } catch (error) {
                console.error("Error cargando clientes:", error);
                showCustomAlert("Error al leer SQLite.", 'error');
            }
        }

        async function saveClient(e) {
            e.preventDefault();
            
            const clientData = {
                rif: document.getElementById('client-rif').value.trim().toUpperCase(),
                nombre: document.getElementById('client-name').value.trim(),
                direccion: document.getElementById('client-address').value.trim(),
                telefono: document.getElementById('client-phone').value.trim(),
                correo: 'S/C', // Campo por defecto si lo pide SQLite
                company_id: companyId
            };

            try {
                const resultado = await window.nexusAPI.guardarClienteLocal(clientData);
                
                if (resultado && !resultado.error) {
                    showCustomAlert(editingClientRif ? "Cliente actualizado." : "Cliente guardado.", 'success');
                    cancelEdit(); // Limpia el formulario
                    fetchClients(); // Refresca la tabla
                } else {
                    throw new Error(resultado.error);
                }
            } catch (error) {
                showCustomAlert("Error al guardar cliente.", 'error');
                console.error(error);
            }
        }

        async function deleteClient(rif, nombre) {
            // Reutilizamos la lógica del modal confirm() que ya tienes en otros lados
            if (confirm(`⚠️ ¿Seguro que deseas eliminar al cliente ${nombre} (${rif})?`)) {
                try {
                    const res = await window.nexusAPI.eliminarClienteLocal(rif);
                    if (res && !res.error) {
                        showCustomAlert("Cliente eliminado.", 'success');
                        fetchClients();
                    } else {
                        throw new Error(res.error);
                    }
                } catch (error) {
                    showCustomAlert("Fallo al eliminar.", 'error');
                }
            }
        }

        // --- 4. CONTROL DE EDICIÓN ---
        function editClient(client) {
            editingClientRif = client.rif;
            
            document.getElementById('client-rif').value = client.rif;
            document.getElementById('client-name').value = client.nombre || '';
            document.getElementById('client-address').value = client.direccion || '';
            document.getElementById('client-phone').value = client.telefono || '';
            
            // Bloqueamos el input del RIF para que no pueda cambiar la clave primaria
            rifInput.disabled = true;
            rifInput.classList.add('bg-gray-100', 'text-gray-500');

            btnSaveText.textContent = 'Actualizar';
            btnCancelEdit.classList.remove('hidden');
        }

        function cancelEdit() {
            clientForm.reset();
            editingClientRif = null;
            
            rifInput.disabled = false;
            rifInput.classList.remove('bg-gray-100', 'text-gray-500');
            
            btnSaveText.textContent = 'Guardar';
            btnCancelEdit.classList.add('hidden');
        }

        // --- 5. RENDERIZADO ---
        function renderClients(clientes) {
            clientsTableBody.innerHTML = '';
            
            if (!clientes || clientes.length === 0) {
                clientsTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No hay clientes registrados localmente.</td></tr>';
                return;
            }

            clientes.forEach(c => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50 border-b border-gray-100 transition-colors";
                
                tr.innerHTML = `
                    <td class="px-6 py-4 text-sm font-bold text-indigo-700">${c.rif}</td>
                    <td class="px-6 py-4 text-sm font-medium text-gray-900">${c.nombre}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${c.telefono && c.telefono !== '00000000000' ? c.telefono : 'N/A'}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 truncate max-w-xs">${c.direccion || 'N/A'}</td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <button class="edit-btn text-blue-600 hover:text-blue-900 text-lg transition-colors"><i class="fas fa-edit"></i></button>
                        <button class="delete-btn text-red-600 hover:text-red-900 text-lg transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;

                tr.querySelector('.edit-btn').onclick = () => editClient(c);
                tr.querySelector('.delete-btn').onclick = () => deleteClient(c.rif, c.nombre);
                clientsTableBody.appendChild(tr);
            });
        }

        // --- 6. UTILIDADES ---
        function showCustomAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.textContent = message;
            const bgColor = type === 'success' ? '#10B981' : '#EF4444'; // Verde o Rojo
            alertDiv.style.cssText = `
                position: fixed; top: 20px; right: 20px;
                background-color: ${bgColor}; color: white; padding: 15px 25px; 
                border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
                z-index: 1000; transition: opacity 0.5s ease;
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => { alertDiv.style.opacity = '0'; setTimeout(() => alertDiv.remove(), 500); }, 3000);
        }

        // Eventos
        clientForm.addEventListener('submit', saveClient);
        btnCancelEdit.addEventListener('click', cancelEdit);

        // Arrancar
        initModuloClientes();
    </script>
</body>
</html>
