<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online NEXUS POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        /* Configuración global de fuente */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
        }
        /* Estilos de scrollbar para un toque moderno */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #2563EB; border-radius: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        
        /* Clase para simular un contenedor de logo con un placeholder */
        .logo-placeholder {
            min-width: 70px;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #e5e7eb;
            color: #4b5563;
            font-weight: 600;
            border-radius: 9999px;
            border: 1px dashed #9ca3af;
            transition: all 0.2s ease-in-out;
        }
        /* Oculta la barra de desplazamiento horizontal en la navegación móvil pero permite el scroll */
        #mobile-scroll-nav-menu::-webkit-scrollbar {
            display: none;
        }
        #mobile-scroll-nav-menu {
            -ms-overflow-style: none; /* IE and Edge */
            scrollbar-width: none; /* Firefox */
        }

        /* Estilo para los iconos SVG */
        .icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            stroke: currentColor;
        }
    </style>
</head>

    <main class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-8 flex justify-center">
            <div class="relative flex w-full max-w-3xl items-stretch">

<script type="module">
    // =======================================================
    // ========== 1. CONFIGURACIÓN E INICIALIZACIÓN FIREBASE =========
    // =======================================================

    // Importaciones de Firebase (Usamos type="module" para esto)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";
    
    // **TU CONFIGURACIÓN DE FIREBASE**
    const firebaseConfig = {
        apiKey: "AIzaSyDN9mZ1n-OkC-Qz52eTCOy4yJH7M0U9zYI",
        authDomain: "nexus-pos-75593.firebaseapp.com",
        projectId: "nexus-pos-75593",
        storageBucket: "nexus-pos-75593.firebasestorage.app",
        messagingSenderId: "626840984883",
        appId: "1:626840984883:web:08d56544ee28bc8e637246",
        measurementId: "G-K1EQVJWJHG"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const storeData = {
        categories: [],
        products: [],
        cart: []
    };
    
    // =======================================================
    // ========== 1.1. AJUSTES DE CONFIGURACIÓN DE LA TIENDA (DINÁMICO) ==========
    // =======================================================

    const tiendaConfig = {
        whatsappNumber: "584120000000", // Default: Fallback
        storeName: "Tu Tienda Online", // Default: Fallback
        logoUrl: null,
        currencyCode: 'BS', // Moneda principal de la tienda (desde Firestore)
        deliveryEnabled: true,
        // ⭐ CAMPOS DE TASA DE CAMBIO
        exchangeRateMethod: 'RateDB', // RateDB o RateManual
        manualExchangeRate: 0.00,    // Valor de la tasa manual
        bcvRate: 1.00                // Tasa efectiva a usar para la división. Inicializar en 1.00.
    };
    
    let currentCategory = 'all';
    let currentCompanyId = null;
    let currentSort = 'name-asc';
    let currentDisplayCurrency = 'BS'; // ⭐ NUEVO ESTADO: Moneda que el usuario está viendo actualmente

    // =======================================================
    // ========== 2. FUNCIONES DE CARGA DE DATOS FIREBASE Y CONFIGURACIÓN ========
    // =======================================================

    function extractCompanyId() {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('company')) {
            return urlParams.get('company'); 
        }
        
        const pathSegments = window.location.pathname.split('/').filter(segment => segment.length > 0);
        const tiendaIndex = pathSegments.findIndex(segment => segment.includes('tienda'));
        
        if (tiendaIndex !== -1 && pathSegments.length > tiendaIndex + 1) {
            return pathSegments[tiendaIndex + 1]; 
        }
        
        console.error('[FATAL] No se pudo extraer el Company ID de la URL. Use ?company=ID para cargar los datos.');
        return null; 
    }
    
    /**
     * Carga la tasa BCV desde el documento 'exchange/bcv' y extrae la parte entera.
     * @param {string} companyId - ID de la compañía.
     * @returns {Promise<number>} La tasa de cambio (parte entera) o 1 si hay error.
     */
    async function fetchBcvRate(companyId) {
        const bcvDocPath = `companies/${companyId}/exchange/bcv`;
        try {
            console.log(`[DEBUG] Intentando cargar tasa BCV en la ruta: ${bcvDocPath}`);
            const docSnap = await getDoc(doc(db, bcvDocPath));
            
            if (docSnap.exists() && docSnap.data().rate) {
                const rateData = docSnap.data().rate;
                
                const rateString = rateData.toString();
                
                let rateValue = rateString.includes(':') ? rateString.split(':')[1].trim() : rateString.trim();
                
                const parsedRate = parseFloat(rateValue);
                // Si parsedRate es un número válido y mayor a cero, usamos la parte entera, sino 1
                const integerPart = (parsedRate && parsedRate > 0) ? Math.floor(parsedRate) : 1; 
                
                console.log(`✅ Tasa BCV cargada y parseada (solo entero): ${integerPart}`);
                return integerPart;
            } else {
                console.warn(`[DEBUG] Documento de tasa BCV NO ENCONTRADO o sin campo 'rate'. Usando tasa de 1.`);
                return 1;
            }
        } catch (error) {
            console.error("Error al cargar tasa BCV:", error);
            return 1;
        }
    }


    async function loadTiendaConfig(companyId) {
        if (!companyId || !db) return;

        // RUTA DINÁMICA DE LA CONFIGURACIÓN
        const tiendaDocPath = `companies/${companyId}/configs/tienda`;
        
        try {
            console.log(`[DEBUG] Intentando cargar documento en la ruta: ${tiendaDocPath}`); 
            
            const docSnap = await getDoc(doc(db, tiendaDocPath));
            
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                tiendaConfig.storeName = data.storeName || tiendaConfig.storeName;
                tiendaConfig.whatsappNumber = data.whatsappNumber || tiendaConfig.whatsappNumber;
                tiendaConfig.logoUrl = data.logoUrl || tiendaConfig.logoUrl;
                tiendaConfig.currencyCode = data.currencyCode || tiendaConfig.currencyCode;
                tiendaConfig.deliveryEnabled = data.deliveryEnabled !== undefined ? data.deliveryEnabled : tiendaConfig.deliveryEnabled;

                // ⭐ CARGAR CAMPOS DE TASA DE CAMBIO
                tiendaConfig.exchangeRateMethod = data.exchangeRateMethod || tiendaConfig.exchangeRateMethod;
                tiendaConfig.manualExchangeRate = parseFloat(data.manualExchangeRate) || 0.00; 

                // ⭐ LÓGICA DE DETERMINACIÓN DE LA TASA A USAR
                if (tiendaConfig.currencyCode === 'USD') {
                    if (tiendaConfig.exchangeRateMethod === 'RateDB') {
                        tiendaConfig.bcvRate = await fetchBcvRate(companyId);
                    } else if (tiendaConfig.exchangeRateMethod === 'RateManual' && tiendaConfig.manualExchangeRate > 0) {
                        tiendaConfig.bcvRate = tiendaConfig.manualExchangeRate;
                        console.log(`[DEBUG] Usando Tasa Manual: ${tiendaConfig.bcvRate}`);
                    } else {
                        console.warn("Moneda en USD pero tasa de cambio no pudo determinarse. Usando tasa de 1.");
                        tiendaConfig.bcvRate = 1;
                    }
                } else {
                    tiendaConfig.bcvRate = 1; // Si la tienda usa BS como principal, la tasa es 1.
                }

                // ⭐ INICIALIZAR LA MONEDA DE VISUALIZACIÓN con la moneda configurada por la tienda.
                // Si la tasa es > 0 Y la moneda principal es USD, inicia en USD. Si no, inicia en BS.
                currentDisplayCurrency = (tiendaConfig.currencyCode === 'USD' && tiendaConfig.bcvRate > 0) ? 'USD' : 'BS';

                console.log("✅ Configuración de Tienda cargada (incl. Tasa):", tiendaConfig);
            } else {
                console.warn(`[DEBUG] Documento de configuración NO ENCONTRADO en Firestore: ${tiendaDocPath}`);
                console.warn("Configuración de tienda no encontrada. Usando valores por defecto.");
            }
        } catch (error) {
            console.error("Error al cargar configuración de Tienda:", error);
        }
    }

    async function loadStoreData(companyId) {
        currentCompanyId = companyId;

        if (!companyId) {
            document.getElementById('category-title').textContent = 'Error: ID de Cliente no encontrado.';
            renderProducts([]); 
            return;
        }

        document.getElementById('category-title').textContent = 'Cargando Productos...';
        
        storeData.categories = [{ 
            id: 'all', 
            name: 'Todos los Productos', 
            title: 'Todos los Productos' 
        }];
        storeData.products = [];
        
        try {
            // 1. CARGAR CATEGORÍAS
            const categoriesCol = collection(db, `companies/${companyId}/categories`);
            const categorySnapshot = await getDocs(categoriesCol);
            
            categorySnapshot.forEach(doc => {
                storeData.categories.push({ 
                    id: doc.id, 
                    name: doc.data().name || 'Sin Nombre', 
                    title: doc.data().name || 'Productos de esta Categoría' 
                });
            });
            
            // 2. CARGAR PRODUCTOS
            const productsCol = collection(db, `companies/${companyId}/products`);
            const productSnapshot = await getDocs(productsCol);
            
            productSnapshot.forEach(doc => {
                const data = doc.data();
                
                let productPrice = typeof data.price === 'number' ? data.price : 
                                   (typeof data.price === 'string' ? parseFloat(data.price) : 0.00);
                
                const categoryName = storeData.categories.find(c => c.id === data.category)?.name || 'Sin Categoría';

                storeData.products.push({
                    id: doc.id,
                    name: data.name,
                    categoryId: data.category, 
                    price: productPrice, 
                    imageUrl: data.image || 'https://placehold.co/400x300/f0f0f0/AAAAAA?text=Sin+Imagen',
                    collection: categoryName
                });
            });
            
            // 3. INICIAR RENDERIZADO
            switchCategory('all'); 

        } catch (error) {
            console.error("Error al cargar datos de Firebase:", error);
            document.getElementById('category-title').textContent = 'Error al cargar los datos de la tienda. (Ver consola para detalles)';
            renderProducts([]);
        }
    }


    // =======================================================
    // ========== 3. FUNCIONES DE RENDERIZADO Y LÓGICA DE TIENDA ========
    // =======================================================
    
    /**
     * Formatea el precio, aplicando la división por la tasa de cambio si el usuario eligió USD.
     * @param {number} amount - Precio base en Bolívares (el precio real del producto).
     * @returns {string} Precio formateado (solo USD o solo Bs).
     */
    function formatPrice(amount) {
        // ⭐ CLAVE: Usa el estado de visualización del usuario (currentDisplayCurrency)
        const displayAsUSD = currentDisplayCurrency === 'USD'; 
        
        if (displayAsUSD && tiendaConfig.bcvRate > 0) {
            const rate = tiendaConfig.bcvRate; 
            const amountUSD = amount / rate;
            return `$${amountUSD.toFixed(2)}`; 
        } else {
            // Muestra en Bolívares si:
            // 1. El usuario eligió BS.
            // 2. No hay tasa de cambio válida (bcvRate <= 0).
            return `Bs${amount.toFixed(2)}`;
        }
    }

    /**
     * Filtra y ordena los productos basándose en la categoría, la búsqueda y el criterio de ordenamiento.
     */
    function getFilteredAndSortedProducts(products, categoryId, query = '') {
        let filtered = products;

        // 1. Filtrado por Categoría
        if (categoryId !== 'all') {
            filtered = products.filter(p => p.categoryId === categoryId);
        }

        // 2. Filtrado por Búsqueda
        const normalizedQuery = query.toLowerCase().trim();
        if (normalizedQuery) {
            filtered = filtered.filter(p => 
                p.name.toLowerCase().includes(normalizedQuery) ||
                p.collection.toLowerCase().includes(normalizedQuery)
            );
        }
        
        // Obtener el criterio de ordenamiento actual
        const sortByElement = document.getElementById('sort-by');
        const sortCriteria = sortByElement ? sortByElement.value : currentSort;
        currentSort = sortCriteria;

        // 3. Ordenamiento
        filtered.sort((a, b) => {
            if (sortCriteria === 'name-asc') return a.name.localeCompare(b.name);
            if (sortCriteria === 'name-desc') return b.name.localeCompare(a.name);
            
            // Usa el precio base en BS para ordenar, que es la referencia
            if (sortCriteria === 'price-asc') return a.price - b.price;
            if (sortCriteria === 'price-desc') return b.price - a.price;
            
            return 0;
        });

        return filtered;
    }


    function renderCategories(activeCategoryId) {
        const desktopMenu = document.getElementById('desktop-nav-menu');
        const mobileScrollMenu = document.getElementById('mobile-scroll-nav-menu');
        
        desktopMenu.innerHTML = '';
        mobileScrollMenu.innerHTML = '';

        storeData.categories.forEach(category => {
            const isActive = category.id === activeCategoryId;
            
            const desktopLinkClass = isActive ? 'bg-white text-primary shadow-sm' : 'text-gray-600 hover:bg-blue-100 hover:text-primary';
            const desktopLink = document.createElement('a');
            desktopLink.href = "#";
            desktopLink.textContent = category.name;
            desktopLink.className = `py-2 px-3 rounded-lg text-sm font-medium transition duration-150 nav-link flex-shrink-0 ${desktopLinkClass}`;
            desktopLink.onclick = (e) => {
                e.preventDefault();
                switchCategory(category.id);
            };
            desktopMenu.appendChild(desktopLink);

            const mobileLinkClass = isActive ? 'bg-primary text-white shadow-md' : 'text-gray-700 bg-gray-200 hover:bg-gray-300';
            const mobileLink = document.createElement('a');
            mobileLink.href = "#";
            mobileLink.textContent = category.name;
            mobileLink.className = `inline-block px-4 py-2 mx-1 rounded-full text-base font-medium transition duration-150 flex-shrink-0 ${mobileLinkClass}`;
            mobileLink.onclick = (e) => {
                e.preventDefault();
                switchCategory(category.id);
                document.getElementById('mobile-menu').classList.add('hidden');
            };
            mobileScrollMenu.appendChild(mobileLink);
        });
    }

    function renderProducts(productsToRender) {
        const grid = document.getElementById('products-grid');
        const noResults = document.getElementById('no-results');
        grid.innerHTML = '';

        if (productsToRender.length === 0) {
            grid.classList.add('hidden');
            noResults.classList.remove('hidden');
            return;
        }

        grid.classList.remove('hidden');
        noResults.classList.add('hidden');

        productsToRender.forEach(product => {
            const productId = product.id; 
            
            // He modificado la estructura interna para que el precio y el botón 
            // se apilen verticalmente (flex-col) evitando desbordes.
            const cardHtml = `
                <div id="product-card-${productId}" class="product-card bg-white p-4 rounded-xl shadow-md flex flex-col justify-between border border-gray-100 hover:shadow-xl transition h-full">
                    <div>
                        <div class="aspect-square w-full mb-3 overflow-hidden rounded-lg bg-gray-50">
                             <img src="${product.imageUrl}" class="w-full h-full object-cover" alt="${product.name}">
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 leading-tight mb-1 break-words">${product.name}</h3>
                        <p class="text-[10px] font-bold text-blue-600 bg-blue-50 py-1 px-2 rounded inline-block mb-3 uppercase tracking-wider">${product.collection}</p>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <div id="action-default-${productId}" class="flex flex-col gap-3">
                            <div class="text-2xl font-black text-primary leading-none break-all">
                                ${formatPrice(product.price)}
                            </div>
                            <button onclick="window.toggleQuantityInput('${productId}')" class="w-full flex justify-center items-center px-4 py-2 bg-primary text-white font-bold rounded-lg hover:bg-primary-dark transition">
                                 <svg class="icon w-4 h-4 mr-2" viewBox="0 0 24 24" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                 AÑADIR
                            </button>
                        </div>

                        <div id="action-quantity-${productId}" class="hidden flex flex-col gap-2">
                            <input id="quantity-input-${productId}" type="number" value="1" class="w-full text-center p-2 border border-gray-300 rounded-lg text-lg">
                            <div class="flex gap-2">
                                <button onclick="window.confirmAddToCart('${productId}')" class="flex-grow p-2 bg-green-500 text-white font-bold rounded-lg text-sm">OK</button>
                                <button onclick="window.toggleQuantityInput('${productId}', true)" class="p-2 bg-gray-100 text-gray-500 rounded-lg italic text-xs">X</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', cardHtml);
        });
    }

    function switchCategory(categoryId) {
        currentCategory = categoryId;
        const categoryInfo = storeData.categories.find(c => c.id === categoryId);
        
        document.getElementById('category-title').textContent = categoryInfo?.title || 'Productos';
        
        const currentQuery = document.getElementById('search-input').value;
        const productsToRender = getFilteredAndSortedProducts(storeData.products, categoryId, currentQuery);
            
        renderCategories(categoryId);
        renderProducts(productsToRender);
        document.getElementById('search-input').value = currentQuery; // Mantener el texto de búsqueda
    }
    
    function showTemporaryMessage(message, type = 'info') {
        let colorClass = 'bg-blue-500';
        if (type === 'success') colorClass = 'bg-green-500';
        if (type === 'info') colorClass = 'bg-blue-500';
        
        const messageBox = document.createElement('div');
        messageBox.textContent = message;
        messageBox.className = `fixed bottom-4 right-4 p-4 rounded-lg text-white shadow-xl z-50 transition-opacity duration-300 ${colorClass}`;
        
        document.body.appendChild(messageBox);
        
        setTimeout(() => {
            messageBox.classList.add('opacity-0');
            messageBox.addEventListener('transitionend', () => messageBox.remove());
        }, 3000);
    }


    // =======================================================
    // ========== 4. LÓGICA DE CARRITO Y PEDIDO ============
    // =======================================================
    
    function searchProducts(query) {
        const productsToRender = getFilteredAndSortedProducts(storeData.products, currentCategory, query);
        renderProducts(productsToRender);
    }

    /**
     * Re-ordena los productos y refresca la vista.
     */
    function sortProducts(criteria) {
        currentSort = criteria;
        // Re-renderiza usando la categoría y búsqueda actual
        searchProducts(document.getElementById('search-input').value);
    }
    
    /**
     * ⭐ NUEVA FUNCIÓN: Alterna el estado de visualización de la moneda.
     */
    function toggleCurrencyDisplay() {
        // Solo permitir cambiar si hay una tasa de cambio cargada (y mayor a 0)
        if (tiendaConfig.bcvRate <= 0) {
            showTemporaryMessage("La tasa de cambio no está configurada o es cero.", 'info');
            return;
        }

        currentDisplayCurrency = currentDisplayCurrency === 'BS' ? 'USD' : 'BS';
        
        // 1. Actualizar el botón de la UI
        updateCurrencyToggleUI();
        
        // 2. Forzar un re-renderizado de los productos (usando la búsqueda actual)
        searchProducts(document.getElementById('search-input').value);

        // 3. Forzar un re-renderizado del carrito
        renderCart(); 
        
        showTemporaryMessage(`Precios actualizados a ${currentDisplayCurrency}.`, 'info');
    }

    function toggleQuantityInput(productId, hideOnly = false) {
        const defaultAction = document.getElementById(`action-default-${productId}`);
        const quantityAction = document.getElementById(`action-quantity-${productId}`);
        const quantityInput = document.getElementById(`quantity-input-${productId}`);

        if (quantityAction.classList.contains('hidden') && !hideOnly) {
            defaultAction.classList.add('hidden');
            quantityAction.classList.remove('hidden');
            quantityInput.focus();
            quantityInput.select();
        } else {
            quantityAction.classList.add('hidden');
            defaultAction.classList.remove('hidden');
            quantityInput.value = 1; 
        }
    }

    function confirmAddToCart(productId) {
        const quantityInput = document.getElementById(`quantity-input-${productId}`);
        let quantity = parseFloat(quantityInput.value); 

        if (isNaN(quantity) || quantity <= 0) {
            quantity = 1; 
            quantityInput.value = 1;
        }
        
        quantity = parseFloat(quantity.toFixed(3)); 

        const product = storeData.products.find(p => p.id === productId);
        if (product) {
            const existingItemIndex = storeData.cart.findIndex(item => item.id === productId);

            if (existingItemIndex > -1) {
                storeData.cart[existingItemIndex].quantity += quantity;
                storeData.cart[existingItemIndex].quantity = parseFloat(storeData.cart[existingItemIndex].quantity.toFixed(3));
            } else {
                storeData.cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price, // Este precio es el valor base en BS
                    quantity: quantity
                });
            }
            
            showTemporaryMessage(`¡${quantity}x "${product.name}" añadido al carrito!`, 'success');
            renderCart(); 
        } else {
             console.error(`Producto con ID ${productId} no encontrado en storeData.`);
        }

        toggleQuantityInput(productId, true);
    }
    
    function openCartDrawer() {
        document.getElementById('cart-drawer-overlay').classList.remove('hidden');
        document.getElementById('cart-drawer').classList.remove('translate-x-full');
        document.body.classList.add('overflow-hidden');
        renderCart(); 
        resetCheckout(); // Asegura que se muestre el botón inicial
    }

    function closeCartDrawer() {
        document.getElementById('cart-drawer-overlay').classList.add('hidden');
        document.getElementById('cart-drawer').classList.add('translate-x-full');
        document.body.classList.remove('overflow-hidden');
    }
    
    function renderCart() {
        const container = document.getElementById('cart-items-container');
        const subtotalDisplay = document.getElementById('cart-subtotal-display');
        const totalItemsDisplay = document.getElementById('cart-total-items-display');
        const cartCountDesktop = document.getElementById('cart-count');
        const cartCountMobile = document.getElementById('cart-count-mobile');
        
        const emptyMessage = container.querySelector('#cart-empty-message');
        
        let itemsHtml = ''; 
        let subtotal = 0;
        let totalItems = 0;

        // Limpiamos los items antiguos
        Array.from(container.children).forEach(child => {
            if (child.id !== 'cart-empty-message') {
                child.remove();
            }
        });

        if (storeData.cart.length === 0) {
            emptyMessage.classList.remove('hidden');
            resetCheckout(); // Oculta las opciones si el carrito está vacío
        } else {
            emptyMessage.classList.add('hidden');
            
            storeData.cart.forEach(item => {
                const itemTotal = item.price * item.quantity; // El cálculo se hace con el precio base en BS
                subtotal += itemTotal;
                totalItems += item.quantity;

                let quantityDisplay;
                if (item.quantity < 1) {
                    const grams = (item.quantity * 1000);
                    quantityDisplay = `${grams.toLocaleString(undefined, { maximumFractionDigits: 0 })} g`;
                } else {
                    quantityDisplay = `${item.quantity.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 3 })} unid.`;
                }
                
                itemsHtml += `
                    <div class="flex justify-between items-center py-2 border-b border-gray-200">
                        <div class="flex flex-col flex-grow pr-4">
                            <span class="font-semibold text-gray-900">${item.name}</span>
                            <span class="text-sm text-gray-500">${formatPrice(item.price)} x <strong class="text-gray-700">${quantityDisplay}</strong></span>
                        </div>
                        <div class="flex items-center space-x-3 flex-shrink-0">
                            <span class="font-bold text-gray-800 text-lg">${formatPrice(itemTotal)}</span>
                            <button onclick="window.removeItemFromCart('${item.id}')" class="text-red-500 hover:text-red-700 p-1 rounded transition duration-150">
                                <svg class="icon w-5 h-5" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            });

            // Insertamos los items DESPUÉS del mensaje de vacío
             emptyMessage.insertAdjacentHTML('afterend', itemsHtml);
        }

        subtotalDisplay.textContent = formatPrice(subtotal);
        totalItemsDisplay.textContent = parseFloat(totalItems.toFixed(3)); 
        cartCountDesktop.textContent = parseFloat(totalItems.toFixed(3));
        cartCountMobile.textContent = parseFloat(totalItems.toFixed(3));
    }

    function removeItemFromCart(productId) {
        const initialCount = storeData.cart.length;
        storeData.cart = storeData.cart.filter(item => item.id !== productId);
        
        if (storeData.cart.length < initialCount) {
            showTemporaryMessage(`Ítem eliminado del carrito.`, 'info');
            renderCart();
        }
    }

    // =======================================================
    // ========== 5. FUNCIONES DE CHECKOUT Y WHATSAPP ==========
    // =======================================================

    function initCheckout() {
        if (storeData.cart.length === 0) {
            showTemporaryMessage("Tu carrito está vacío. Añade productos para finalizar la compra.", 'info');
            return;
        }
        document.getElementById('checkout-initial-button').classList.add('hidden');
        document.getElementById('checkout-options-form').classList.remove('hidden');
    }

    function resetCheckout() {
        document.getElementById('checkout-options-form').classList.add('hidden');
        document.getElementById('checkout-initial-button').classList.remove('hidden');
    }

    function sendWhatsAppOrder() {
        if (storeData.cart.length === 0) {
            showTemporaryMessage("El carrito está vacío.", 'info');
            return;
        }

        // 1. Obtener el método de pedido seleccionado
        const selectedMethod = document.querySelector('input[name="orderMethod"]:checked').value;

        // 2. Generar el mensaje del pedido
        let message = `*¡Hola! Mi pedido para ${tiendaConfig.storeName} es el siguiente:*\n\n`;
        message += `*🛒 Productos:*\n`;

        let subtotal = 0;

        storeData.cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            subtotal += itemTotal;

            // Lógica de formato de cantidad (tomada de renderCart)
            let quantityDisplay;
            if (item.quantity < 1) {
                const grams = (item.quantity * 1000);
                quantityDisplay = `${grams.toLocaleString(undefined, { maximumFractionDigits: 0 })} g`;
            } else {
                quantityDisplay = `${item.quantity.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 3 })} unid.`;
            }
            
            message += `${index + 1}. ${item.name}\n`;
            message += `   *Cantidad:* ${quantityDisplay} x ${formatPrice(item.price)}\n`;
            message += `   *Total:* ${formatPrice(itemTotal)}\n`;
        });
        
        // 3. Agregar resumen y método de entrega
        message += `\n*=============================*\n`;
        message += `*💰 Subtotal: ${formatPrice(subtotal)}*\n`;
        message += `*🚚 Método de Entrega: ${selectedMethod}*\n`;
        message += `*=============================*\n\n`;
        
        if (selectedMethod === 'Delivery') {
            message += `*NOTA:* Por favor, enviarme el costo de Delivery y solicitarme la dirección de envío.\n\n`;
        }
        
        message += `¡Gracias!`;

        // 4. Codificar el mensaje y generar el enlace de WhatsApp
        const encodedMessage = encodeURIComponent(message);
        const whatsappLink = `https://wa.me/${tiendaConfig.whatsappNumber}?text=${encodedMessage}`;
        
        // 5. Abrir el enlace, cerrar el carrito y resetear
        window.open(whatsappLink, '_blank');
        closeCartDrawer();
        resetCheckout();
        
        showTemporaryMessage("Pedido enviado a WhatsApp. ¡Revisa tu chat!", 'success');
    }


    // =======================================================
    // ========== 6. FUNCIONES DE CONFIGURACIÓN DE UI ==========
    // =======================================================

    function updateStorefrontConfigUI() {
        const logoDisplay = document.getElementById('logo-display');
        const deliveryContainer = document.querySelector('input[value="Delivery"]').closest('label');

        // 1. Configuración de Logo
        if (tiendaConfig.logoUrl) {
             // Reemplazar placeholder con la imagen Base64
             logoDisplay.innerHTML = `<img src="${tiendaConfig.logoUrl}" alt="${tiendaConfig.storeName}" class="h-full w-full object-cover rounded-full">`;
             // Ajustamos las clases de tamaño/forma
             logoDisplay.classList.remove('logo-placeholder', 'bg-e5e7eb', 'text-4b5563', 'border', 'border-dashed');
             logoDisplay.classList.add('h-10', 'w-10', 'p-0'); 
        } else {
             // Asegurar que el placeholder muestra la inicial de la tienda
             const storeInitial = tiendaConfig.storeName.charAt(0).toUpperCase() || 'L';
             logoDisplay.innerHTML = `<span>${storeInitial}</span>`;
             logoDisplay.classList.remove('p-0'); // Asegurar que el placeholder tiene padding
        }
        
        // 2. Control de Delivery (Ocultar si está deshabilitado)
        if (!tiendaConfig.deliveryEnabled) {
            deliveryContainer.style.display = 'none';
            // Forzamos "Retiro en Tienda" como seleccionado si Delivery no está habilitado
            const retiroRadio = document.querySelector('input[value="Retiro en Tienda"]');
            if (retiroRadio) {
                retiroRadio.checked = true;
            }
        } else {
             deliveryContainer.style.display = 'flex';
        }
    }
    
    /**
     * ⭐ NUEVA FUNCIÓN: Actualiza la etiqueta y el estado del botón de cambio de moneda.
     */
    function updateCurrencyToggleUI() {
        const toggleBtn = document.getElementById('currency-toggle-btn');
        if (!toggleBtn) return;
        
        // Si no hay tasa de cambio válida, deshabilita el botón
        if (tiendaConfig.bcvRate <= 0) {
            toggleBtn.textContent = 'Tasa no definida';
            toggleBtn.disabled = true;
            toggleBtn.classList.remove('hover:bg-gray-300');
            toggleBtn.classList.add('bg-gray-100', 'cursor-not-allowed');
            return;
        } else {
             toggleBtn.disabled = false;
             toggleBtn.classList.remove('bg-gray-100', 'cursor-not-allowed');
             toggleBtn.classList.add('hover:bg-gray-300');
        }

        // Si la moneda actual es BS, el botón debe decir "Ver en USD" (para cambiar a USD)
        if (currentDisplayCurrency === 'BS') {
            toggleBtn.textContent = 'Ver en USD';
        } else {
            // Si la moneda actual es USD, el botón debe decir "Ver en Bs" (para cambiar a BS)
            toggleBtn.textContent = 'Ver en Bs';
        }
    }


    // =======================================================
    // ========== 7. INICIALIZACIÓN FINAL ========================
    // =======================================================
    
    // Exportar funciones a la ventana global (window)
    window.searchProducts = searchProducts; 
    window.sortProducts = sortProducts;
    window.toggleCurrencyDisplay = toggleCurrencyDisplay; // ⭐ FUNCIÓN CLAVE
    window.toggleQuantityInput = toggleQuantityInput;
    window.confirmAddToCart = confirmAddToCart;
    window.openCartDrawer = openCartDrawer;
    window.closeCartDrawer = closeCartDrawer;
    window.renderCart = renderCart;
    window.removeItemFromCart = removeItemFromCart;
    window.initCheckout = initCheckout; 
    window.resetCheckout = resetCheckout; 
    window.sendWhatsAppOrder = sendWhatsAppOrder; 
    
    // Toggle del Menú Móvil
    document.getElementById('menu-toggle').addEventListener('click', function() {
        const mobileMenu = document.getElementById('mobile-menu');
        mobileMenu.classList.toggle('hidden');
    });

    // Inicialización de la aplicación (Se ejecuta cuando el HTML está listo)
    document.addEventListener('DOMContentLoaded', async () => {
        
        // Conexión de botones del carrito (Usa la clase 'cart-button-trigger')
        document.querySelectorAll('.cart-button-trigger').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                window.openCartDrawer();
            });
        });
        
        // INICIAMOS LA CARGA DE FIREBASE
        const companyId = extractCompanyId();
        
        // 1. Cargar Configuración de la Tienda desde Firestore y la Tasa de Cambio
        await loadTiendaConfig(companyId);

        // 2. Aplicar Configuración a la UI (Logo, Delivery, etc.)
        updateStorefrontConfigUI(); 
        updateCurrencyToggleUI(); // ⭐ LLAMADA INICIAL PARA CONFIGURAR EL BOTÓN
        
        // 3. Cargar Productos y Categorías
        loadStoreData(companyId);
    });
</script>
