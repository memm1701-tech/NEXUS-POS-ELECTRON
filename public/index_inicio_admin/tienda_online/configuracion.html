<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Tienda Online</title>
    <link href="../node_modules/@fontsource/roboto/index.css" rel="stylesheet">
    <script src="tailwindcss.js"></script>
    <style>
        body {
            background-color: #f3f4f6;
            /* Cambio de fuente a Roboto como en inventario.html */
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 2.5rem;
            max-width: 100%; 
            width: 100%;    
            min-height: 100vh;
            border-radius: 0;
            box-shadow: none;
        }
        /* Estilo de título idéntico a inventario.html */
        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -1px;
            text-align: center;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2563EB;
        }
        input:checked + .slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
        }
    </style>
</head>
<body>
<main class="w-full">
    <div class="container space-y-8">
        <h1>Configuración de Tienda Online</h1>
        
        <p id="messageBox" class="text-center font-bold h-6"></p>

        <div class="flex flex-col md:flex-row gap-6">
            
            <div class="space-y-4 text-left p-4 border border-blue-200 bg-blue-50 rounded-md md:flex-1">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-store mr-2 text-blue-600"></i> Ajustes de Identidad
                </h2>

                <div class="space-y-2">
                    <label for="storeNameInput" class="block text-sm font-medium text-gray-700">Nombre de la Tienda:</label>
                    <input type="text" id="storeNameInput" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="Ej: Inversiones Nexus C.A.">
                </div>

                <div class="space-y-2">
                    <label for="whatsappNumberInput" class="block text-sm font-medium text-gray-700">Número de WhatsApp (Ej: 584120000000):</label>
                    <input type="text" id="whatsappNumberInput" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" placeholder="584121234567">
                </div>
                
                <div class="space-y-2">
                    <label for="logoFileInput" class="block text-sm font-medium text-gray-700">Cargar Logo de la Empresa (Máx 5MB):</label>
                    <div class="flex items-center space-x-3 p-2 bg-white border border-gray-300 rounded-md shadow-sm">
                        <input type="file" id="logoFileInput" accept="image/png, image/jpeg" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <img id="logoPreview" class="h-10 w-10 object-cover rounded-full border border-gray-300 hidden flex-shrink-0" alt="Vista previa del logo">
                    </div>
                    <input type="hidden" id="logoUrlInput"> 
                    <p id="logoMessage" class="text-xs text-gray-500"></p>
                </div>

                <div class="flex items-center justify-between p-3 bg-white rounded-md shadow-sm border border-gray-200">
                    <span class="text-sm font-medium text-gray-700">Habilitar Opción de Delivery (Envío)</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="deliveryEnabledToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="space-y-4 text-left p-4 border border-green-200 bg-green-50 rounded-md md:flex-1">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-money-bill-wave mr-2 text-green-600"></i> Configuración de Moneda
                </h2>

                <div class="space-y-2">
                    <label for="currencySelect" class="block text-sm font-medium text-gray-700">Seleccionar Moneda de la Tienda:</label>
                    <select id="currencySelect" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border">
                        <option value="BS">Bolívares (BS)</option>
                        <option value="USD">Dólares (USD)</option>
                    </select>
                </div>

                <hr class="border-green-300">
                <h3 class="text-md font-semibold text-gray-700">Gestión de Tasa de Cambio</h3>

                <div class="space-y-2">
                    <label for="exchangeRateMethodSelect" class="block text-sm font-medium text-gray-700">Origen de la Tasa:</label>
                    <select id="exchangeRateMethodSelect" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border">
                        <option value="RateDB">Cargar desde Base de Datos (BCV)</option>
                        <option value="RateManual">Establecer Tasa Manualmente</option>
                    </select>
                </div>

                <div id="manualRateContainer" class="space-y-2 hidden">
                    <label for="manualExchangeRateInput" class="block text-sm font-medium text-gray-700">Monto Manual de Tasa:</label>
                    <input type="text" id="manualExchangeRateInput" 
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border text-lg font-bold text-center" 
                           placeholder="Ej: 36.50" 
                           pattern="[0-9]*[.]?[0-9]*"> 
                </div>
            </div>
        </div>

        <button id="saveConfigBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-md shadow-lg transition duration-300 ease-in-out text-xl">
            Guardar Configuración de Tienda
        </button>
    </div>
</main>

<script type="module">
    // --- 1. CONSTANTES Y OPCIONES ---
    const CURRENCY_OPTIONS = [
        { code: 'BS', symbol: 'Bs', position: 'prefix', name: 'Bolívares (BS)' },
        { code: 'USD', symbol: '$', position: 'prefix', name: 'Dólares (USD)' },
    ];
    const DEFAULT_CURRENCY_CODE = 'BS';
    const DEFAULT_WHATSAPP = '584120000000';
    const DEFAULT_STORE_NAME = 'Mi Tienda Online';
    const DEFAULT_RATE_METHOD = 'RateDB';
    const DEFAULT_MANUAL_RATE = 0.00;

    // --- 2. VARIABLES DE ESTADO ---
    let companyId = null; 

    // --- 3. REFERENCIAS DOM ---
    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const messageBox = document.getElementById('messageBox');
    const storeNameInput = document.getElementById('storeNameInput');
    const whatsappNumberInput = document.getElementById('whatsappNumberInput');
    const logoFileInput = document.getElementById('logoFileInput');
    const logoUrlInput = document.getElementById('logoUrlInput'); 
    const logoPreview = document.getElementById('logoPreview');
    const deliveryEnabledToggle = document.getElementById('deliveryEnabledToggle');
    const currencySelect = document.getElementById('currencySelect');
    const exchangeRateMethodSelect = document.getElementById('exchangeRateMethodSelect');
    const manualRateContainer = document.getElementById('manualRateContainer');
    const manualExchangeRateInput = document.getElementById('manualExchangeRateInput');

    // --- 4. FUNCIONES DE UTILIDAD Y UI ---
    function showMessage(message, color) {
        messageBox.textContent = message;
        messageBox.style.color = color;
        if(color === 'green') setTimeout(() => messageBox.textContent = '', 3000);
    }
    
    function convertFileToBase64(file) {
        return new Promise((resolve, reject) => {
            const LIMITE_15MB = 15 * 1024 * 1024; // 15MB
            if (file.size > LIMITE_15MB) { 
                reject(new Error("El archivo es demasiado grande. El límite máximo es de 15MB."));
                return;
            }
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file); 
        });
    }
    
    async function handleLogoFileChange(file) {
        try {
            const base64String = await convertFileToBase64(file);
            logoUrlInput.value = base64String;
            logoPreview.src = base64String;
            logoPreview.classList.remove('hidden');
        } catch (error) {
            console.error("Error al procesar el logo:", error);
            logoPreview.classList.add('hidden');
            logoUrlInput.value = '';
            logoFileInput.value = ''; 
            showMessage(error.message, 'red');
        }
    }

    function populateCurrencySelect(selectedCode) {
        currencySelect.innerHTML = '';
        CURRENCY_OPTIONS.forEach(option => {
            const opt = document.createElement('option');
            opt.value = option.code;
            opt.textContent = option.name;
            if (option.code === selectedCode) opt.selected = true;
            currencySelect.appendChild(opt);
        });
    }
    
    function handleRateMethodChange() {
        if (exchangeRateMethodSelect.value === 'RateManual') {
            manualRateContainer.classList.remove('hidden');
        } else {
            manualRateContainer.classList.add('hidden');
        }
    }
    
    function validateManualRateInput() {
        let cleanedValue = manualExchangeRateInput.value.replace(',', '.').replace(/[^\d.]/g, '');
        const parts = cleanedValue.split('.');
        if (parts.length > 2) cleanedValue = parts[0] + '.' + parts.slice(1).join('');
        manualExchangeRateInput.value = cleanedValue;
    }

    // --- 5. LÓGICA DE PERSISTENCIA (SQLITE LOCAL) ---
    async function inicializar() {
        try {
            const sesion = await window.nexusAPI.obtenerSesionLocal();
            companyId = (sesion && sesion.companyId) ? sesion.companyId : 'NEXUS-LOCAL';
            await loadTiendaConfig();
        } catch (error) { 
            console.error("Error al arrancar:", error); 
            companyId = 'NEXUS-LOCAL';
            await loadTiendaConfig();
        }
    }

    async function loadTiendaConfig() {
        try {
            console.log("📂 Nexus POS: Intentando cargar configuración...");
            const configDataRaw = await window.nexusAPI.obtenerConfiguracionCajera('config_tienda_online');
            
            if (configDataRaw) {
                const data = typeof configDataRaw === 'string' ? JSON.parse(configDataRaw) : configDataRaw;
                console.log("✅ Datos recuperados con éxito.");

                if (storeNameInput) storeNameInput.value = data.storeName || '';
                if (whatsappNumberInput) whatsappNumberInput.value = data.whatsappNumber || '';
                if (deliveryEnabledToggle) deliveryEnabledToggle.checked = data.deliveryEnabled === true;
                if (currencySelect) currencySelect.value = data.currencyCode || 'BS';
                if (exchangeRateMethodSelect) exchangeRateMethodSelect.value = data.exchangeRateMethod || 'RateDB';
                if (manualExchangeRateInput) manualExchangeRateInput.value = data.manualExchangeRate || '0.00';

                // Restauración del Logo
                if (data.logoUrl && data.logoUrl.trim() !== "") {
                    if (logoUrlInput) logoUrlInput.value = data.logoUrl;
                    if (logoPreview) {
                        logoPreview.src = data.logoUrl;
                        logoPreview.classList.remove('hidden');
                    }
                }

                handleRateMethodChange();
                console.log("🎯 Formulario de configuración rellenado.");
            } else {
                console.log("ℹ️ No se encontró configuración previa.");
            }
        } catch (error) {
            console.error("❌ Error crítico al rellenar el formulario:", error);
        }
    }

    async function saveConfiguration() {
    try {
        if (!companyId) companyId = 'NEXUS-LOCAL';
        
        saveConfigBtn.disabled = true;
        saveConfigBtn.textContent = "Guardando y Sincronizando...";

        // 1. Recolección de todos los campos del formulario
        const tiendaData = {
            ultimoCambio: new Date().toISOString(),
            companyId: companyId, 
            storeName: storeNameInput?.value?.trim() || DEFAULT_STORE_NAME,
            whatsappNumber: whatsappNumberInput?.value?.trim() || DEFAULT_WHATSAPP,
            logoUrl: logoUrlInput?.value?.trim() || '',
            deliveryEnabled: deliveryEnabledToggle?.checked || false,
            currencyCode: currencySelect?.value || DEFAULT_CURRENCY_CODE,
            exchangeRateMethod: exchangeRateMethodSelect?.value || DEFAULT_RATE_METHOD,
            manualExchangeRate: parseFloat(manualExchangeRateInput?.value) || 0,
        };

        // 2. Guardado en la Base de Datos Local (SQLite)
        await window.nexusAPI.guardarConfiguracionCajera('config_tienda_online', tiendaData);

        // 3. Sincronización con el Servidor Xeon (MongoDB - Puerto 3007)
        // Usamos el nuevo canal que expusimos en el puente
        const syncStatus = await window.nexusAPI.sincronizarConfiguracionXeon(tiendaData);
        
        if (syncStatus.success) {
            showMessage("✅ Configuración guardada y sincronizada con el Xeon.", 'green');
        } else {
            // Si falla el Xeon, igual notificamos que lo local sí se guardó
            console.warn("⚠️ Fallo de sincronización nube:", syncStatus.error);
            showMessage("✅ Guardado localmente (Servidor Xeon fuera de línea).", 'blue');
        }

    } catch (error) {
        console.error("Fallo crítico en guardado:", error);
        showMessage(`❌ Error al guardar: ${error.message}`, 'red');
    } finally {
        saveConfigBtn.disabled = false;
        saveConfigBtn.textContent = "Guardar Configuración de Tienda";
    }
}


    // --- 6. EVENT LISTENERS Y ARRANQUE DIRECTO ---
    logoFileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleLogoFileChange(e.target.files[0]);
    });

    exchangeRateMethodSelect.addEventListener('change', handleRateMethodChange);
    manualExchangeRateInput.addEventListener('input', validateManualRateInput);
    saveConfigBtn.addEventListener('click', saveConfiguration);

    // 🔥 EL SECRETO DEL DETECTIVE:
    // Ya no usamos DOMContentLoaded porque al ser type="module", el DOM YA ESTÁ LISTO aquí.
    console.log("🚀 Módulo de configuración listo, iniciando ejecución...");
    inicializar(); 
</script>
</body>
</html>
