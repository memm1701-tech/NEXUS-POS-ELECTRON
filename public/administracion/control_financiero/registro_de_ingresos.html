<div class="max-w-7xl mx-auto animate-fade-in p-4 md:p-8">
    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-input { border: 1px solid #f3f4f6; transition: all 0.2s; }
        .custom-input:focus { border-color: #e5e7eb; background-color: white; outline: none; }
    </style>

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800 italic">Registro de Ingresos</h2>
            <p class="text-sm text-gray-500">Documentación de ventas y entradas de capital.</p>
        </div>
        
        <div class="flex gap-4">
            <div class="bg-white px-4 py-2 rounded-lg border border-gray-200 shadow-sm text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Ingresos Mes</p>
                <p class="text-sm font-bold text-blue-600" id="total-ingresos-mes">Bs. 0,00</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 h-fit">
            <h4 class="font-bold text-gray-800 mb-6 italic">Nuevo Asiento de Ingreso</h4>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Cliente / Concepto</label>
                    <input type="text" id="ingreso-cliente" placeholder="Ej: Venta de productos" 
                        class="w-full p-3 bg-gray-50 rounded-xl custom-input text-sm text-gray-700">
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Cuenta de Ingreso (Haber)</label>
                        <select id="ingreso-tipo" class="w-full p-3 bg-gray-50 rounded-xl custom-input text-sm text-gray-700 appearance-none">
                            <optgroup label="Ingresos Operativos">
                                <option value="4100 · Ventas">4100 · Ventas de Mercancía</option>
                                <option value="4200 · Servicios">4200 · Prestación de Servicios</option>
                                <option value="4300 · Comisiones">4300 · Comisiones Recibidas</option>
                                <option value="4900 · Otros">4900 · Otros Ingresos</option>
                            </optgroup>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Recibido en (Debe)</label>
                        <select id="cuenta-destino" class="w-full p-3 bg-gray-50 rounded-xl custom-input text-sm text-gray-700 appearance-none">
                            <option value="1101 · Caja">1101 · Caja Principal</option>
                            <option value="1102 · Banco">1102 · Banco (Transferencia)</option>
                            <option value="1201 · Clientes">1201 · Clientes (A Crédito)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Fecha</label>
                        <input type="date" id="ingreso-fecha" class="w-full p-3 bg-gray-50 rounded-xl custom-input text-xs text-gray-600">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Monto Bruto Bs.</label>
                        <input type="text" id="ingreso-monto" placeholder="0,000,000,000" 
                            class="w-full p-3 bg-blue-50/30 border border-blue-50 rounded-xl text-blue-600 font-bold outline-none text-lg">
                    </div>
                </div>

                <button id="btn-registrar-ingreso" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold hover:bg-black transition-all mt-4 flex items-center justify-center gap-3 shadow-lg shadow-gray-200">
                    <span class="text-sm">Registrar Ingreso</span>
                    <i class="material-icons text-sm">trending_up</i>
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
            <h4 class="font-bold text-gray-800 mb-6 italic">Últimos Ingresos Registrados</h4>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-widest text-gray-400 border-b border-gray-50">
                            <th class="pb-4 font-bold">Fecha / Ref</th>
                            <th class="pb-4 font-bold">Detalle de Venta</th>
                            <th class="pb-4 font-bold text-right">Monto</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-ingresos-body" class="text-sm text-gray-600 divide-y divide-gray-50">
                    </tbody>
                </table>
                
                <div id="empty-state-ingresos" class="py-20 text-center">
                    <i class="material-icons text-gray-200 text-5xl mb-3">receipt_long</i>
                    <p class="text-gray-400 text-[10px] uppercase tracking-widest font-bold">Sin ingresos en este período</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        (function() {
            const fechaInput = document.getElementById('ingreso-fecha');
            if(fechaInput) fechaInput.valueAsDate = new Date();
            
            const btnSave = document.getElementById('btn-registrar-ingreso');
            const emptyState = document.getElementById('empty-state-ingresos');
            const tbody = document.getElementById('tabla-ingresos-body');
            const montoInput = document.getElementById('ingreso-monto');
            let acumulado = 0;

            if (montoInput) {
                montoInput.addEventListener('input', function(e) {
                    let cursorPosition = e.target.selectionStart;
                    let originalLength = e.target.value.length;
                    let value = e.target.value.replace(/[^\d,]/g, "");
                    let parts = value.split(',');
                    if (parts.length > 2) value = parts[0] + ',' + parts.slice(1).join("");
                    if (parts[0].length > 0) {
                        parts[0] = new Intl.NumberFormat('de-DE').format(parseInt(parts[0]));
                    }
                    e.target.value = parts.join(',');
                    let newPosition = cursorPosition + (e.target.value.length - originalLength);
                    e.target.setSelectionRange(newPosition, newPosition);
                });
            }

            if (btnSave) {
                btnSave.addEventListener('click', () => {
                    const cliente = document.getElementById('ingreso-cliente').value;
                    const montoRaw = montoInput.value;
                    const categoria = document.getElementById('ingreso-tipo').value;
                    const destino = document.getElementById('cuenta-destino').value;
                    const fecha = document.getElementById('ingreso-fecha').value;
                    
                    const montoNumerico = parseFloat(montoRaw.replace(/\./g, '').replace(',', '.'));

                    if(!cliente || isNaN(montoNumerico)) {
                        alert("Por favor, ingrese el concepto y el monto del ingreso.");
                        return;
                    }

                    if(emptyState) emptyState.classList.add('hidden');

                    acumulado += montoNumerico;
                    const displayTotal = document.getElementById('total-ingresos-mes');
                    if(displayTotal) displayTotal.innerText = `Bs. ${acumulado.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

                    const row = `
                        <tr class="animate-fade-in group hover:bg-gray-50/50">
                            <td class="py-5 text-xs font-medium text-gray-400 align-top">
                                ${fecha}<br><span class="text-[9px] text-gray-300">ID: REC-${Math.floor(Math.random() * 9000) + 1000}</span>
                            </td>
                            <td class="py-5">
                                <div class="font-bold text-gray-800">${cliente}</div>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[9px] bg-green-50 text-green-600 px-1.5 py-0.5 rounded font-bold uppercase">${categoria}</span>
                                    <i class="material-icons text-[10px] text-gray-300">arrow_forward</i>
                                    <span class="text-[9px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-bold uppercase">${destino}</span>
                                </div>
                            </td>
                            <td class="py-5 text-right align-top">
                                <span class="font-bold text-green-600 block">Bs. ${montoNumerico.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                                <span class="text-[9px] text-gray-400 italic">Pago verificado</span>
                            </td>
                        </tr>
                    `;
                    
                    if(tbody) tbody.insertAdjacentHTML('afterbegin', row);
                    document.getElementById('ingreso-cliente').value = '';
                    montoInput.value = '';
                });
            }
        })();
    </script>
</div>
